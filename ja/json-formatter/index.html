            <p>JSONデータの整形、検証、圧縮を行います。開発者向けの広告なしツール。</p>



            <!-- Action Buttons -->
            <div class="btn-group">
                <button class="btn btn-primary" onclick="formatJSON()">整形</button>
                <button class="btn btn-secondary" onclick="minifyJSON()">圧縮</button>
                <button class="btn btn-secondary" onclick="validateJSON()">検証</button>
                <button class="btn btn-secondary" onclick="copyOutput()">コピー</button>
                <button class="btn btn-secondary" onclick="clearAll()">クリア</button>
            </div>

            <!-- Editors -->
            <div class="editor-container">
                <div class="editor-panel">
                    <label class="form-label">入力JSON</label>
                    <textarea id="jsonInput" class="form-textarea json-textarea"
                        placeholder="JSONデータを入力..."></textarea>
                </div>

                <div class="editor-panel">
                    <label class="form-label">結果</label>
                    <textarea id="jsonOutput" class="form-textarea json-textarea" readonly></textarea>
                </div>

            <!-- Validation Status -->

    <script src="/assets/js/common.js"></script>
    <script>
        const input = document.getElementById('jsonInput');
        const output = document.getElementById('jsonOutput');
        const validationStatus = document.getElementById('validationStatus');
        const errorMessage = document.getElementById('errorMessage');

        function formatJSON() {
            try {
                const json = JSON.parse(input.value);
                output.value = JSON.stringify(json, null, 2);
                showValidation(true);
            } catch (e) {
                showValidation(false, e.message);
            }
        }

        function minifyJSON() {
            try {
                const json = JSON.parse(input.value);
                output.value = JSON.stringify(json);
                showValidation(true);
            } catch (e) {
                showValidation(false, e.message);
            }
        }

        function validateJSON() {
            try {
                JSON.parse(input.value);
                showValidation(true);
                output.value = '';
            } catch (e) {
                showValidation(false, e.message);
                output.value = '';
            }
        }

        function copyOutput() {
            if (output.value) {
                Utils.copyToClipboard(output.value);
            } else {
                Utils.showToast('✗ 無効なJSON');
            }
        }

        function clearAll() {
            input.value = '';
            output.value = '';
            validationStatus.style.display = 'none';
            errorMessage.style.display = 'none';
        }

        function showValidation(isValid, error = '') {
            validationStatus.style.display = 'block';
            validationStatus.className = 'validation-status ' + (isValid ? 'valid' : 'invalid');
            validationStatus.textContent = isValid ? '✓ 有効なJSON' : '✗ 無効なJSON';

            if (error) {
                errorMessage.style.display = 'block';
                errorMessage.className = 'error-message';
                errorMessage.textContent = 'エラー: ' + error;
            } else {
                errorMessage.style.display = 'none';
            }
        }

        // Auto-validate on input
        input.addEventListener('input', Utils.debounce(() => {
            if (input.value.trim()) {
                try {
                    JSON.parse(input.value);
                    showValidation(true);
                } catch (e) {
                    // Don't show error while typing
                }
            } else {
                validationStatus.style.display = 'none';
                errorMessage.style.display = 'none';
            }
        }, 500));
    </script>
