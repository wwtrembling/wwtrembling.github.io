    <script>
        const pattern = document.getElementById('pattern');
        const testString = document.getElementById('testString');
        const results = document.getElementById('results');
        const flagG = document.getElementById('flagG');
        const flagI = document.getElementById('flagI');
        const flagM = document.getElementById('flagM');

        const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

        function test() {
            try {
                const flags = (flagG.checked ? 'g' : '') + (flagI.checked ? 'i' : '') + (flagM.checked ? 'm' : '');
                const regex = new RegExp(pattern.value, flags);
                const text = testString.value;
                const matches = [...text.matchAll(regex)];

                if (matches.length === 0) {
                    results.textContent = '';
                    const p = document.createElement('p');
                    p.textContent = '一致は見つかりませんでした';
                    results.appendChild(p);
                    return;
                }

                let html = `<h3>一致 (${matches.length})</h3>`;
                matches.forEach((match, i) => {
                    html += `<div class="match-item">Match ${i + 1}: "${escapeHtml(match[0])}" (Index: ${match.index})</div>`;
                });

                let highlighted = '';
                let cursor = 0;
                const ordered = [...matches].sort((a, b) => a.index - b.index);
                ordered.forEach(match => {
                    highlighted += escapeHtml(text.slice(cursor, match.index));
                    highlighted += '<span class="highlight">' + escapeHtml(match[0]) + '</span>';
                    cursor = match.index + match[0].length;
                });
                highlighted += escapeHtml(text.slice(cursor));
                html += `<h3>ハイライト</h3><div style="line-height: 1.8;">${highlighted}</div>`;
                results.innerHTML = html;
            } catch (e) {
                results.textContent = '';
                const p = document.createElement('p');
                p.style.color = 'red';
                p.textContent = 'エラー: ' + e.message;
                results.appendChild(p);
            }
        }

        pattern.addEventListener('input', test);
        testString.addEventListener('input', test);
        flagG.addEventListener('change', test);
        flagI.addEventListener('change', test);
        flagM.addEventListener('change', test);
        test();
    </script>
