<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Ezoic -->
    <script data-cfasync="false" src="https://cmp.gatekeeperconsent.com/min.js"></script>
    <script data-cfasync="false" src="https://the.gatekeeperconsent.com/cmp.min.js"></script>
    <script async src="//www.ezojs.com/ezoic/sa.min.js"></script>
    <script>
        window.ezstandalone = window.ezstandalone || {};
        ezstandalone.cmd = ezstandalone.cmd || [];
    </script>
    <script src="//ezoicanalytics.com/analytics.js"></script>
    <meta name="google-adsense-account" content="ca-pub-6334819180242631">
    <title>Base64 एनकोडर/डिकोडर - Utilify</title>
    <meta name="description" content="टेक्स्ट को Base64 में एनकोड या डिकोड करें।">
    <link rel="canonical" href="https://utilifyapp.net/hi/base64-converter/">
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        .converter-box {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }

        .btn-group {
            display: flex;
            gap: var(--spacing-md);
            margin: var(--spacing-lg) 0;
        }

        .btn {
            flex: 1;
            padding: var(--spacing-md);
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6334819180242631"
        crossorigin="anonymous"></script>
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content"><a href="/hi/" class="site-logo">Utilify</a></div>
        </div>
    </header>
    <main class="main-content">
        <div class="container-narrow">
            <h1>🔐 Base64 कनवर्टर</h1>
            <div class="security-badge"
                style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                <span title="Processed securely in client-side">🔒 सुरक्षित और क्लाइंट-साइड</span>
                <button id="pwaInstallBtn" class="btn btn-primary"
                    style="display: none; padding: 4px 12px; font-size: 12px;">📲 ऐप इंस्टॉल करें</button>
            </div>

            <p>टेक्स्ट को Base64 में एनकोड या डिकोड करें।</p>
            <div class="converter-box">
                <label class="form-label">इनपुट टेक्स्ट</label>
                <textarea id="input" class="form-input" style="min-height: 150px;"
                    placeholder="एनकोड करने के लिए टेक्स्ट दर्ज करें">Hello World!</textarea>
                <div class="btn-group">
                    <button class="btn btn-primary" id="encodeBtn">⬇️ एनकोड</button>
                    <button class="btn btn-primary" id="decodeBtn">⬆️ डिकोड</button>
                    <button class="btn btn-secondary" id="copyBtn">📋 कॉपी करें</button>
                    <button class="btn btn-secondary" id="clearBtn">🗑️ साफ़ करें</button>
                </div>
                <label class="form-label">आउटपुट परिणाम</label>
                <textarea id="output" class="form-input" style="min-height: 150px;" readonly></textarea>
            </div>

            <div class="related-tools-section">
                <h3>संबंधित उपकरण</h3>
                <div class="related-buttons">
                    <a href="/hi/json-formatter/" class="related-btn">JSON फॉर्मेटर</a><a
                        href="/hi/sql-formatter/" class="related-btn">SQL फॉर्मेटर</a><a
                        href="/hi/password-generator/" class="related-btn">पासवर्ड जेनरेटर</a>
                </div>
            </div>

        </div>
    </main>
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <p></p>
            </div>
        </div>
    </footer>
    <script src="/assets/js/common.js"></script>
    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        document.getElementById('encodeBtn').addEventListener('click', () => {
            try {
                output.value = btoa(unescape(encodeURIComponent(input.value)));
            } catch (e) {
                alert('एनकोडिंग त्रुटि: ' + e.message);
            }
        });

        document.getElementById('decodeBtn').addEventListener('click', () => {
            try {
                output.value = decodeURIComponent(escape(atob(input.value)));
            } catch (e) {
                alert('डिकोडिंग त्रुटि: ' + e.message);
            }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            if (output.value) Utils.copyToClipboard(output.value);
            else alert('कॉपी करने के लिए कुछ नहीं।');
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            input.value = '';
            output.value = '';
        });
    </script>
</body>

</html>
