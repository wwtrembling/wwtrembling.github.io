<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content"><a href="/ko/" class="site-logo">🛠️ Utilify</a></div>

    </header>
    <main class="main-content">
        <div class="container-narrow">
            <h1>⏲️ Unix 타임스탬프 변환기</h1>
            <div class="security-badge"
                style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                <span title="Processed securely in client-side">🔒 Secure & Client-side</span>
                <button id="pwaInstallBtn" class="btn btn-primary"
                    style="display: none; padding: 4px 12px; font-size: 12px;">📲 Install App</button>
            </div>
            <p>Unix 타임스탬프와 날짜를 변환합니다. 초/밀리초를 자동 감지하고 UTC와 로컬 시간을 함께 보여줍니다.</p>

            <div class="now-display">
                <div style="font-size: 0.875rem; color: var(--text-secondary);">현재 Unix 시간 (UTC)</div>
                <div class="now-value" id="nowSec">—</div>
                <div style="font-size: 0.875rem;" id="nowIso">—</div>
            </div>

            <div class="ts-section">
                <label class="form-label">Unix 타임스탬프 → 날짜</label>
                <input type="text" id="tsInput" class="form-input" placeholder="예: 1700000000 또는 1700000000000">
                <div class="btn-group" style="margin-top: var(--spacing-sm);">
                    <button class="btn btn-primary" id="convertTsBtn">변환</button>
                    <button class="btn btn-secondary" id="useNowBtn">현재 시각</button>
                </div>
                <div class="ts-output" id="tsOutUtc"><strong>UTC</strong><span>—</span></div>
                <div class="ts-output" id="tsOutLocal"><strong>로컬</strong><span>—</span></div>
            </div>

            <div class="ts-section">
                <label class="form-label">날짜 → Unix 타임스탬프</label>
                <input type="text" id="dateInput" class="form-input" placeholder="예: 2024-01-15T12:00:00Z 또는 2024-01-15">
                <div class="btn-group" style="margin-top: var(--spacing-sm);">
                    <button class="btn btn-primary" id="convertDateBtn">변환</button>
                </div>
                <div class="ts-output" id="dateOutSec"><strong>초</strong><span>—</span></div>
                <div class="ts-output" id="dateOutMs"><strong>밀리초</strong><span>—</span></div>
            </div>

            <div class="related-tools-section">
                <h3>관련 도구</h3>
                <div class="related-buttons">
                    <a href="/ko/date-calculator/" class="related-btn">날짜 계산기</a><a
                        href="/ko/timer/" class="related-btn">타이머</a><a

    <script src="/assets/js/common.js"></script>
    <script>
        const nowSecEl = document.getElementById('nowSec');
        const nowIsoEl = document.getElementById('nowIso');
        const tsInput = document.getElementById('tsInput');
        const dateInput = document.getElementById('dateInput');

        function pad(n) { return String(n).padStart(2, '0'); }
        function localPretty(d) {
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
                + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        }

        function tickNow() {
            const now = Math.floor(Date.now() / 1000);
            nowSecEl.textContent = now;
            nowIsoEl.textContent = new Date().toISOString();
        }
        tickNow();
        setInterval(tickNow, 1000);

        function setSpan(elId, value) {
            document.getElementById(elId).querySelector('span').textContent = value;
        }

        document.getElementById('convertTsBtn').addEventListener('click', () => {
            const raw = tsInput.value.trim();
            if (!raw) {
                setSpan('tsOutUtc', '—');
                setSpan('tsOutLocal', '—');
                return;
            }
            let n = Number(raw);
            if (!Number.isFinite(n)) {
                setSpan('tsOutUtc', '유효하지 않은 타임스탬프입니다.');
                setSpan('tsOutLocal', '');
                return;
            }
            // Detect ms vs seconds: any value >= 1e12 is ms.
            const ms = Math.abs(n) >= 1e12 ? n : n * 1000;
            const d = new Date(ms);
            if (isNaN(d.getTime())) {
                setSpan('tsOutUtc', '유효하지 않은 타임스탬프입니다.');
                setSpan('tsOutLocal', '');
                return;
            }
            setSpan('tsOutUtc', d.toISOString());
            setSpan('tsOutLocal', localPretty(d) + ' (' + Intl.DateTimeFormat().resolvedOptions().timeZone + ')');
        });

        document.getElementById('useNowBtn').addEventListener('click', () => {
            tsInput.value = Math.floor(Date.now() / 1000);
            document.getElementById('convertTsBtn').click();
        });

        document.getElementById('convertDateBtn').addEventListener('click', () => {
            const raw = dateInput.value.trim();
            if (!raw) {
                setSpan('dateOutSec', '—');
                setSpan('dateOutMs', '—');
                return;
            }
            const d = new Date(raw);
            if (isNaN(d.getTime())) {
                setSpan('dateOutSec', '유효하지 않은 날짜 문자열입니다.');
                setSpan('dateOutMs', '');
                return;
            }
            const ms = d.getTime();
            setSpan('dateOutSec', String(Math.floor(ms / 1000)));
            setSpan('dateOutMs', String(ms));
        });
    </script>
