            <h1>📊 텍스트로 그리는 다이어그램</h1>
            <p>복잡한 디자인 툴 없이 텍스트만으로 깔끔한 차트를 만드세요. (Mermaid.js 기반)</p>

            <div class="toolbar">
                <button class="btn btn-secondary" onclick="loadExample('flowchart')">🔄 순서도 예제</button>
                <button class="btn btn-secondary" onclick="loadExample('sequence')">⏱️ 시퀀스 예제</button>
                <button class="btn btn-secondary" onclick="loadExample('gantt')">📅 간트 차트</button>
                <div style="flex:1"></div>
                <button class="btn btn-primary" id="downloadBtn">📷 이미지 다운로드 (SVG)</button>
            </div>

            <div class="diagram-container">
                <div class="editor-col">
                    <textarea id="codeEditor" spellcheck="false">graph TD
    A[Start] --> B{Is it working?}
    B -- Yes --> C[Great!]
    B -- No --> D[Debug It]
    D --> B</textarea>
                    <div id="errorMsg" class="error-msg"></div>
                </div>
                <div class="preview-col" id="previewCol">
                    <div class="mermaid" id="diagramOutput">
                        graph TD
                        A[Start] --> B{Is it working?}
                        B -- Yes --> C[Great!]
                        B -- No --> D[Debug It]
                        D --> B
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/assets/js/common.js"></script>
    <script>
        // Init Mermaid
        mermaid.initialize({ startOnLoad: true, theme: 'default' });

        const codeEditor = document.getElementById('codeEditor');
        const diagramOutput = document.getElementById('diagramOutput');
        const previewCol = document.getElementById('previewCol');
        const errorMsg = document.getElementById('errorMsg');
        const downloadBtn = document.getElementById('downloadBtn');

        let timeoutId = null;

        codeEditor.addEventListener('input', () => {
            clearTimeout(timeoutId);
            timeoutId = setTimeout(renderDiagram, 500);
        });

        async function renderDiagram() {
            const code = codeEditor.value;
            errorMsg.style.display = 'none';

            try {
                // Validate syntax (basic try/catch via parse seems tricky with mermaid API changes, 
                // so we rely on render failure or use parse)
                // await mermaid.parse(code); // Validate first

                // Clear and Render
                previewCol.innerHTML = '<div class="mermaid" id="diagramOutput">' + code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>';

                await mermaid.run({
                    querySelector: '#diagramOutput'
                });

            } catch (e) {
                console.error(e);
                errorMsg.textContent = "문법 오류: " + e.message;
                errorMsg.style.display = 'block';
            }
        }

        const examples = {
            flowchart: `graph TD
    A[Christmas] -->|Get money| B(Go shopping)
    B --> C{Let me think}
    C -->|One| D[Laptop]
    C -->|Two| E[iPhone]
    C -->|Three| F[fa:fa-car Car]`,
            sequence: `sequenceDiagram
    Alice->>John: Hello John, how are you?
    John-->>Alice: Great!
    Alice-)John: See you later!`,
            gantt: `gantt
    title A Gantt Diagram
    dateFormat  YYYY-MM-DD
    section Section
    A task           :a1, 2014-01-01, 30d
    Another task     :after a1  , 20d
    section Another
    Task in sec      :2014-01-12  , 12d
    another task      : 24d`
        };

        function loadExample(type) {
            codeEditor.value = examples[type];
            renderDiagram();
        }

        downloadBtn.addEventListener('click', () => {
            // Find SVG
            const svg = document.querySelector('#diagramOutput svg') || document.querySelector('#diagramOutput');
            if (svg) {
                const svgData = new XMLSerializer().serializeToString(svg);
                const blob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "diagram.svg";
                a.click();
            } else {
                alert("다이어그램을 찾을 수 없습니다.");
            }
        });

    </script>
