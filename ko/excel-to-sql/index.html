        .controls {
            display: flex;

            flex-wrap: wrap;

            display: flex;
            align-items: center;

            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);

            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary-color);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        .btn-group {
            display: flex;
            gap: var(--spacing-md);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

    <script>
        const inputConfig = document.getElementById('inputConfig');
        const output = document.getElementById('output');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const tableNameInput = document.getElementById('tableName');

        const firstRowHeader = document.getElementById('firstRowHeader');
        const smartType = document.getElementById('smartType');
        const maskData = document.getElementById('maskData');

        function isNumber(val) {
            return !isNaN(val) && !isNaN(parseFloat(val));
        }

        function maskSensitiveInfo(text) {
            // RRN (Resident Registration Number) Pattern: 6 digits - 7 digits
            text = text.replace(/(\d{6})[- ]?(\d{7})/g, '$1-*******');

            // Phone Number Pattern: 010-xxxx-xxxx or 010xxxxxxxx
            text = text.replace(/(01[016789])[- ]?(\d{3,4})[- ]?(\d{4})/g, '$1-****-$3');

            // Email Masking (optional but good for privacy)
            text = text.replace(/([a-zA-Z0-9._-]+)(@[a-zA-Z0-9._-]+\.[a-z]+)/g, (match, p1, p2) => {
                if (p1.length <= 3) return p1 + p2;
                return p1.substring(0, 3) + '****' + p2;
            });

            return text;
        }

        function formatValue(val) {
            val = val.trim();
            if (maskData.checked) {
                val = maskSensitiveInfo(val);
            }
            if (!smartType.checked) return `'${val}'`;
            if (val === 'NULL' || val === 'null') return 'NULL';
            if (isNumber(val)) return val;
            return `'${val}'`;
        }

        convertBtn.addEventListener('click', () => {
            try {
                const raw = inputConfig.value.trim();
                const lines = raw.split('\n');
                if (lines.length === 0) return;

                const tableName = tableNameInput.value || 'my_table';
                let headers = [];
                let dataLines = lines;

                if (firstRowHeader.checked) {
                    // Extract headers from first line (tab or comma separated)
                    headers = lines[0].split(/\t|,/).map(h => h.trim());
                    dataLines = lines.slice(1);
                }

                let sql = '';
                if (headers.length > 0) {
                    sql += `INSERT INTO ${tableName} (${headers.join(', ')}) VALUES\n`;
                } else {
                    sql += `INSERT INTO ${tableName} VALUES\n`;
                }

                const values = dataLines.map((line, index) => {
                    if (!line.trim()) return null;
                    // Split by tab or comma
                    const cols = line.split(/\t|,/).map(c => formatValue(c));
                    return `  (${cols.join(', ')})`;
                }).filter(v => v !== null);

                sql += values.join(',\n') + ';';
                output.value = sql;

            } catch (e) {
                console.error(e);
                output.value = "Error parsing Data: " + e.message;
            }
        });

        clearBtn.addEventListener('click', () => {
            inputConfig.value = '';
            output.value = '';
            inputConfig.focus();
        });

        copyBtn.addEventListener('click', () => {
            if (output.value) Utils.copyToClipboard(output.value);
            else alert('복사할 내용이 없습니다.');
        });

        // Initial run
        convertBtn.click();

    </script>
