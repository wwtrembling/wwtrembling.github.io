                    style="display: none; padding: 4px 12px; font-size: 12px;">📲 Install App</button>
            </div>

            <p>문자를 percent-encoded 형태(예: 공백 → %20)로 인코딩하거나 다시 디코딩하세요. 쿼리 값은 'Component', 예약 문자(:, /, ?)를 보존해야 한다면 'Full URL' 모드를 사용하세요.</p>

            <div class="mode-row">
                <label><input type="radio" name="mode" value="component" checked> Component (encodeURIComponent)</label>
                <label><input type="radio" name="mode" value="full"> Full URL (encodeURI)</label>

            <div class="url-grid">
                <div>
                    <label class="form-label">입력</label>

                        placeholder="https://example.com/?q=hello world"></textarea>
                </div>
                <div>
                    <label class="form-label">출력</label>
                    <textarea id="outputEl" class="form-input" style="min-height:200px;font-family:var(--font-mono);"

    <script src="/assets/js/common.js"></script>
    <script>
        const inputEl = document.getElementById('inputEl');
        const outputEl = document.getElementById('outputEl');
        const statusEl = document.getElementById('status');

        function getMode() {
            const sel = document.querySelector('input[name="mode"]:checked');
            return sel ? sel.value : 'component';
        }

        function showError(msg) {
            statusEl.style.display = 'block';
            statusEl.style.background = '#fee2e2';
            statusEl.style.color = '#991b1b';
            statusEl.style.border = '1px solid #ef4444';
            statusEl.textContent = msg;
        }

        function clearStatus() { statusEl.style.display = 'none'; }

        function encode() {
            clearStatus();
            try {
                const fn = getMode() === 'full' ? encodeURI : encodeURIComponent;
                outputEl.value = fn(inputEl.value);
            } catch (e) {
                showError('인코딩 오류: ' + e.message);
            }
        }

        function decode() {
            clearStatus();
            try {
                const fn = getMode() === 'full' ? decodeURI : decodeURIComponent;
                outputEl.value = fn(inputEl.value);
            } catch (e) {
                showError('디코딩 오류: ' + e.message);
            }
        }

        document.getElementById('encodeBtn').addEventListener('click', encode);
        document.getElementById('decodeBtn').addEventListener('click', decode);
        document.getElementById('swapBtn').addEventListener('click', () => {
            const a = inputEl.value;
            inputEl.value = outputEl.value;
            outputEl.value = a;
        });
        document.getElementById('copyBtn').addEventListener('click', () => {
            if (outputEl.value) Utils.copyToClipboard(outputEl.value);
            else Utils.showToast('복사할 내용이 없습니다.');
        });
        document.getElementById('clearBtn').addEventListener('click', () => {
            inputEl.value = '';
            outputEl.value = '';
            clearStatus();
        });
    </script>
