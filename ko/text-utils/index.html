            <h1>📝 텍스트 유틸리티</h1>

                style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">

            </div>

            <p>단어 수 세기, 문자 수 세기, 중복 제거, 대소문자 변환 등 다양한 텍스트 처리 기능을 제공합니다.</p>

            <div class="card">
                <label class="form-label">텍스트 입력</label>
                <textarea id="textInput" class="form-textarea" style="min-height: 300px;"
                    placeholder="텍스트를 입력하세요..."></textarea>
            </div>

            <div class="card">
                <h3>통계</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;">
                    <div class="result-box">
                        <div class="result-value" id="charCount">0</div>
                        <div>문자 수</div>
                    </div>
                    <div class="result-box">
                        <div class="result-value" id="wordCount">0</div>
                        <div>단어 수</div>
                    </div>
                    <div class="result-box">
                        <div class="result-value" id="lineCount">0</div>
                        <div>줄 수</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>작업</h3>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="toUpperCase()">대문자로</button>
                    <button class="btn btn-secondary" onclick="toLowerCase()">소문자로</button>
                    <button class="btn btn-secondary" onclick="removeDuplicates()">중복 줄 제거</button>
                    <button class="btn btn-secondary" onclick="sortLines()">줄 정렬</button>
                    <button class="btn btn-secondary" onclick="reverseText()">텍스트 뒤집기</button>
                    <button class="btn btn-primary" onclick="copyText()">복사</button>
                    <button class="btn btn-secondary" onclick="clearText()">지우기</button>
                </div>
            </div>

    <script src="/assets/js/common.js"></script>
    <script>
        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const lineCount = document.getElementById('lineCount');

        function updateStats() {
            const text = textInput.value;
            charCount.textContent = text.length;
            wordCount.textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
            lineCount.textContent = text ? text.split('\n').length : 0;
        }

        function toUpperCase() {
            textInput.value = textInput.value.toUpperCase();
            updateStats();
        }

        function toLowerCase() {
            textInput.value = textInput.value.toLowerCase();
            updateStats();
        }

        function removeDuplicates() {
            const lines = textInput.value.split('\n');
            const unique = [...new Set(lines)];
            textInput.value = unique.join('\n');
            updateStats();
        }

        function sortLines() {
            const lines = textInput.value.split('\n');
            lines.sort();
            textInput.value = lines.join('\n');
            updateStats();
        }

        function reverseText() {
            textInput.value = textInput.value.split('').reverse().join('');
            updateStats();
        }

        function copyText() {
            Utils.copyToClipboard(textInput.value);
        }

        function clearText() {
            textInput.value = '';
            updateStats();
        }

        textInput.addEventListener('input', updateStats);
        updateStats();
    </script>
