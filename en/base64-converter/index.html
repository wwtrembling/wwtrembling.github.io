<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content"><a href="/en/" class="site-logo">🛠️ Utilify</a></div>

    <main class="main-content">
        <div class="container-narrow">
            <h1>🔐 Base64 Encoder/Decoder</h1>
            <div class="security-badge"
                style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                <span title="Processed securely in client-side">🔒 Secure & Client-side</span>
                <button id="pwaInstallBtn" class="btn btn-primary"
                    style="display: none; padding: 4px 12px; font-size: 12px;">📲 Install App</button>
            </div>

            <p>Encode or decode text to Base64.</p>
            <div class="converter-box">
                <label class="form-label">Input Text</label>
                <textarea id="input" class="form-input" style="min-height: 150px;"
                    placeholder="Enter text to encode">Hello World!</textarea>
                <div class="btn-group">
                    <button class="btn btn-primary" id="encodeBtn">⬇️ Encode</button>
                    <button class="btn btn-primary" id="decodeBtn">⬆️ Decode</button>
                    <button class="btn btn-secondary" id="copyBtn">📋 Copy</button>
                    <button class="btn btn-secondary" id="clearBtn">🗑️ Clear</button>
                </div>
                <label class="form-label">Output Result</label>
                <textarea id="output" class="form-input" style="min-height: 150px;" readonly></textarea>
            </div>

            <div class="related-tools-section">
                <h3>Related Tools</h3>
                <div class="related-buttons">
                    <a href="/en/json-formatter/" class="related-btn">JSON Formatter</a><a
                        href="/en/sql-formatter/" class="related-btn">SQL Formatter</a><a

    <script src="/assets/js/common.js"></script>
    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        document.getElementById('encodeBtn').addEventListener('click', () => {
            try {
                output.value = btoa(unescape(encodeURIComponent(input.value)));
            } catch (e) {
                alert('Encoding Error: ' + e.message);
            }
        });

        document.getElementById('decodeBtn').addEventListener('click', () => {
            try {
                output.value = decodeURIComponent(escape(atob(input.value)));
            } catch (e) {
                alert('Decoding Error: ' + e.message);
            }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            if (output.value) Utils.copyToClipboard(output.value);
            else alert('Nothing to copy.');
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            input.value = '';
            output.value = '';
        });
    </script>
