<body>
    <header class="site-header">

    <main class="main-content">
        <div class="container-narrow">
            <h1>Formatador JSON</h1>
            <div class="security-badge"
                style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                <span title="Processed securely in client-side">🔒 Seguro e Cliente-side</span>
                <button id="pwaInstallBtn" class="btn btn-primary"
                    style="display: none; padding: 4px 12px; font-size: 12px;">📲 Instalar App</button>
            </div>

            <p>Formatar, validar e minificar dados JSON. Sem anúncios para desenvolvedores.</p>



            <!-- Action Buttons -->
            <div class="btn-group">
                <button class="btn btn-primary" onclick="formatJSON()">Formatar</button>
                <button class="btn btn-secondary" onclick="minifyJSON()">Minificar</button>
                <button class="btn btn-secondary" onclick="validateJSON()">Validar</button>
                <button class="btn btn-secondary" onclick="copyOutput()">Copiar</button>
                <button class="btn btn-secondary" onclick="clearAll()">Limpar</button>
            </div>

            <!-- Editors -->
            <div class="editor-container">
                <div class="editor-panel">
                    <label class="form-label">Entrada JSON</label>
                    <textarea id="jsonInput" class="form-textarea json-textarea"
                        placeholder="Inserir dados JSON..."></textarea>
                </div>

                <div class="editor-panel">
                    <label class="form-label">Resultado</label>
                    <textarea id="jsonOutput" class="form-textarea json-textarea" readonly></textarea>
                </div>
            </div>

            <!-- Validation Status -->
            <div id="validationStatus" style="display: none;"></div>
            <div id="errorMessage" style="display: none;"></div>

                        href="/pt/base64-converter/" class="related-btn">Conversor Base64</a><a

    <script src="/assets/js/common.js"></script>
    <script>
        const input = document.getElementById('jsonInput');
        const output = document.getElementById('jsonOutput');
        const validationStatus = document.getElementById('validationStatus');
        const errorMessage = document.getElementById('errorMessage');

        function formatJSON() {
            try {
                const json = JSON.parse(input.value);
                output.value = JSON.stringify(json, null, 2);
                showValidation(true);
            } catch (e) {
                showValidation(false, e.message);
            }
        }

        function minifyJSON() {
            try {
                const json = JSON.parse(input.value);
                output.value = JSON.stringify(json);
                showValidation(true);
            } catch (e) {
                showValidation(false, e.message);
            }
        }

        function validateJSON() {
            try {
                JSON.parse(input.value);
                showValidation(true);
                output.value = '';
            } catch (e) {
                showValidation(false, e.message);
                output.value = '';
            }
        }

        function copyOutput() {
            if (output.value) {
                Utils.copyToClipboard(output.value);
            } else {
                Utils.showToast('✗ JSON Inválido');
            }
        }

        function clearAll() {
            input.value = '';
            output.value = '';
            validationStatus.style.display = 'none';
            errorMessage.style.display = 'none';
        }

        function showValidation(isValid, error = '') {
            validationStatus.style.display = 'block';
            validationStatus.className = 'validation-status ' + (isValid ? 'valid' : 'invalid');
            validationStatus.textContent = isValid ? '✓ JSON Válido' : '✗ JSON Inválido';

            if (error) {
                errorMessage.style.display = 'block';
                errorMessage.className = 'error-message';
                errorMessage.textContent = 'Erro: ' + error;
            } else {
                errorMessage.style.display = 'none';
            }
        }

        // Auto-validate on input
        input.addEventListener('input', Utils.debounce(() => {
            if (input.value.trim()) {
                try {
                    JSON.parse(input.value);
                    showValidation(true);
                } catch (e) {
                    // Don't show error while typing
                }
            } else {
                validationStatus.style.display = 'none';
                errorMessage.style.display = 'none';
            }
        }, 500));
    </script>
