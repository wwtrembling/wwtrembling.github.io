    <script>
        const gameArea = document.getElementById('gameArea');
        const message = document.getElementById('message');

        let startTime;
        let endTime;
        let timeoutId;
        let state = 'start'; // start, wait, click, result

        gameArea.addEventListener('mousedown', handleClick);
        gameArea.addEventListener('touchstart', (e) => {
            e.preventDefault(); // prevent double firing
            handleClick();
        });

        function handleClick() {
            if (state === 'start' || state === 'result') {
                startGame();
            } else if (state === 'wait') {
                tooSoon();
            } else if (state === 'click') {
                endGame();
            }
        }

        function startGame() {
            state = 'wait';
            gameArea.className = 'game-area state-wait';
            message.textContent = '等待變綠...';

            const randomTime = Math.floor(Math.random() * 3000) + 2000; // 2-5 seconds
            timeoutId = setTimeout(() => {
                state = 'click';
                gameArea.className = 'game-area state-click';
                message.textContent = '點擊!';
                startTime = performance.now();
            }, randomTime);
        }

        function tooSoon() {
            clearTimeout(timeoutId);
            state = 'start'; // Click to restart
            gameArea.className = 'game-area state-wait'; // Keep red
            message.innerHTML = '太快了! 點擊重試。';
        }

        function endGame() {
            endTime = performance.now();
            const time = Math.round(endTime - startTime);
            state = 'result';

            let rankMsg = '';
            if (time < 200) rankMsg = '< 200 ms: 神級反應! 🏆';
            else if (time < 300) rankMsg = '200 - 300 ms: 極速! 🚀';
            else if (time < 450) rankMsg = '300 - 450 ms: 平均速度。 👌';
            else rankMsg = '> 450 ms: 集中注意力! 🐢';

            gameArea.className = 'game-area state-result';
            message.innerHTML = `
        <div class="result-text">${time} ms</div>
        <div class="rank-text">${rankMsg}</div>
        <div class="sub-text">再玩一次</div>
      `;
        }
    </script>
