                style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                <span title="Processed securely in client-side">🔒 安全 & 用戶端處理</span>

                    style="display: none; padding: 4px 12px; font-size: 12px;">📲 安裝應用</button>
            </div>

            <p>實時測試正則表達式。</p>
            <div class="regex-input">
                <label class="form-label">模式</label>
                <input type="text" id="pattern" class="form-input" placeholder="/[a-z]+/gi" value="[a-z]+">
                <div style="margin-top: var(--spacing-sm);">
                    <label><input type="checkbox" id="flagG" checked> g (全局)</label>
                    <label><input type="checkbox" id="flagI" checked> i (忽略大小寫)</label>
                    <label><input type="checkbox" id="flagM"> m (多行)</label>
                </div>
            </div>
            <div>
                <label class="form-label">測試字符串</label>
                <textarea id="testString" class="form-input test-input"
                    placeholder="輸入測試字符串">Hello World 123 Test</textarea>
            </div>
            <div class="matches" id="results"></div>

    <script src="/assets/js/common.js"></script>
    <script>
        const pattern = document.getElementById('pattern');
        const testString = document.getElementById('testString');
        const results = document.getElementById('results');
        const flagG = document.getElementById('flagG');
        const flagI = document.getElementById('flagI');
        const flagM = document.getElementById('flagM');

        const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

        function test() {
            try {
                const flags = (flagG.checked ? 'g' : '') + (flagI.checked ? 'i' : '') + (flagM.checked ? 'm' : '');
                const regex = new RegExp(pattern.value, flags);
                const text = testString.value;
                const matches = [...text.matchAll(regex)];

                if (matches.length === 0) {
                    results.textContent = '';
                    const p = document.createElement('p');
                    p.textContent = '未找到匹配項';
                    results.appendChild(p);
                    return;
                }

                let html = `<h3>匹配項 (${matches.length})</h3>`;
                matches.forEach((match, i) => {
                    html += `<div class="match-item">Match ${i + 1}: "${escapeHtml(match[0])}" (Index: ${match.index})</div>`;
                });

                let highlighted = '';
                let cursor = 0;
                const ordered = [...matches].sort((a, b) => a.index - b.index);
                ordered.forEach(match => {
                    highlighted += escapeHtml(text.slice(cursor, match.index));
                    highlighted += '<span class="highlight">' + escapeHtml(match[0]) + '</span>';
                    cursor = match.index + match[0].length;
                });
                highlighted += escapeHtml(text.slice(cursor));
                html += `<h3>高亮</h3><div style="line-height: 1.8;">${highlighted}</div>`;
                results.innerHTML = html;
            } catch (e) {
                results.textContent = '';
                const p = document.createElement('p');
                p.style.color = 'red';
                p.textContent = '錯誤: ' + e.message;
                results.appendChild(p);
            }
        }

        pattern.addEventListener('input', test);
        testString.addEventListener('input', test);
        flagG.addEventListener('change', test);
        flagI.addEventListener('change', test);
        flagM.addEventListener('change', test);
        test();
    </script>
