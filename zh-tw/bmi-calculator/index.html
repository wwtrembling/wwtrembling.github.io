<body>
    <a data-utilify-skip class="skip-link" href="#main">Skip to content</a>
    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <a href="/zh-tw/" class="site-logo">🛠️ Utilify</a>
            </div>
        </div>
    </header>
    <main id="main" class="main-content">
        <div class="container-narrow">
            <h1>⚖️ BMI 計算器</h1>
            <div class="security-badge"
                style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                <span title="Processed securely in client-side">🔒 安全 & 用戶端處理</span>
                <button id="pwaInstallBtn" class="btn btn-primary"
                    style="display: none; padding: 4px 12px; font-size: 12px;">📲 安裝應用</button>
            </div>

            <p>計算身體質量指數 (BMI)。</p>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">身高 (cm)</label>
                    <input type="number" id="height" class="form-input" placeholder="170" value="170">
                </div>
                <div class="form-group">
                    <label class="form-label">體重 (kg)</label>
                    <input type="number" id="weight" class="form-input" placeholder="70" value="70">
                </div>
                <button class="btn btn-primary" onclick="calculate()">計算</button>
            </div>
            <div id="result" class="result-box" style="display:none;">
                <div class="result-value" id="bmiValue"></div>
                <div id="bmiCategory"></div>
            </div>

            <div class="related-tools-section">
                <h3>相關工具</h3>

    <script src="/assets/js/common.js"></script>
    <script>
        function calculate() {
            const h = parseFloat(document.getElementById('height').value) / 100;
            const w = parseFloat(document.getElementById('weight').value);
            if (h > 0 && w > 0) {
                const bmi = (w / (h * h)).toFixed(1);
                document.getElementById('bmiValue').textContent = 'BMI: ' + bmi;
                let category = '';
                if (bmi < 18.5) category = '體重過輕';
                else if (bmi < 25) category = '正常';
                else if (bmi < 30) category = '超重';
                else category = '肥胖';
                document.getElementById('bmiCategory').textContent = category;
                document.getElementById('result').style.display = 'block';
            }
        }
    </script>
