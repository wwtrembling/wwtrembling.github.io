            <p>Timer online dan teknik Pomodoro.</p>
            <div class="card text-center">
                <div class="timer-display" id="display">00:00</div>
                <div class="form-group">
                    <label class="form-label">Menit</label>
                    <input type="number" id="minutes" class="form-input" value="25" min="0">
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="start()">Mulai</button>
                    <button class="btn btn-secondary" onclick="pause()">Jeda</button>
                    <button class="btn btn-secondary" onclick="reset()">Reset</button>
                </div>
                <div style="margin-top:1rem;">
                    <button class="btn btn-secondary preset-btn" onclick="setPreset(25)">Pomodoro (25m)</button>
                    <button class="btn btn-secondary preset-btn" onclick="setPreset(5)">Istirahat (5m)</button>

    <script src="/assets/js/common.js"></script>
    <script>
        let totalSeconds = 0;
        let remainingSeconds = 0;
        let interval = null;

        function updateDisplay() {
            const mins = Math.floor(remainingSeconds / 60);
            const secs = remainingSeconds % 60;
            document.getElementById('display').textContent =
                String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        function start() {
            if (!interval) {
                if (remainingSeconds === 0) {
                    totalSeconds = parseInt(document.getElementById('minutes').value) * 60;
                    remainingSeconds = totalSeconds;
                }
                interval = setInterval(() => {
                    if (remainingSeconds > 0) {
                        remainingSeconds--;
                        updateDisplay();
                    } else {
                        pause();
                        alert('Waktu habis!');
                    }
                }, 1000);
            }
        }

        function pause() {
            if (interval) {
                clearInterval(interval);
                interval = null;
            }
        }

        function reset() {
            pause();
            remainingSeconds = 0;
            updateDisplay();
        }

        function setPreset(mins) {
            document.getElementById('minutes').value = mins;
            reset();
        }

        updateDisplay();
    </script>
