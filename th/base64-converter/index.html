<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script data-cfasync="false" src="https://cmp.gatekeeperconsent.com/min.js"></script>
    <script data-cfasync="false" src="https://the.gatekeeperconsent.com/cmp.min.js"></script>

    <script>
        window.ezstandalone = window.ezstandalone || {};
        ezstandalone.cmd = ezstandalone.cmd || [];
    </script>

    <meta name="google-adsense-account" content="ca-pub-6334819180242631">
    <title>ตัวแปลง Base64 เข้ารหัส/ถอดรหัส - Utilify</title>
    <meta name="description" content="เข้ารหัสหรือถอดรหัสข้อความไปยัง Base64">
    <link rel="canonical" href="https://utilifyapp.net/th/base64-converter/">
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        .converter-box {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }

        .btn-group {
            display: flex;
            gap: var(--spacing-md);
            margin: var(--spacing-lg) 0;
        }

        .btn {
            flex: 1;
            padding: var(--spacing-md);
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6334819180242631"
        crossorigin="anonymous"></script>
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content"><a href="/th/" class="site-logo">🛠️ Utilify</a></div>
        </div>
    </header>
    <main class="main-content">
        <div class="container-narrow">
            <h1>🔐 ตัวแปลง Base64</h1>
            <div class="security-badge"
                style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                <span title="Processed securely in client-side">🔒 Secure & Client-side</span>
                <button id="pwaInstallBtn" class="btn btn-primary"
                    style="display: none; padding: 4px 12px; font-size: 12px;">📲 Install App</button>
            </div>

            <p>เข้ารหัสหรือถอดรหัสข้อความไปยัง Base64</p>
            <div class="converter-box">
                <label class="form-label">ข้อความนำเข้า</label>
                <textarea id="input" class="form-input" style="min-height: 150px;"
                    placeholder="ป้อนข้อความเพื่อเข้ารหัส">Hello World!</textarea>
                <div class="btn-group">
                    <button class="btn btn-primary" id="encodeBtn">⬇️ เข้ารหัส</button>
                    <button class="btn btn-primary" id="decodeBtn">⬆️ ถอดรหัส</button>
                    <button class="btn btn-secondary" id="copyBtn">📋 คัดลอก</button>
                    <button class="btn btn-secondary" id="clearBtn">🗑️ ล้าง</button>
                </div>
                <label class="form-label">ผลลัพธ์</label>
                <textarea id="output" class="form-input" style="min-height: 150px;" readonly></textarea>
            </div>

            <div class="related-tools-section">
                <h3>เครื่องมือที่เกี่ยวข้อง</h3>
                <div class="related-buttons">
                    <a href="/th/json-formatter/" class="related-btn">ตัวจัดรูปแบบ JSON</a><a
                        href="/th/sql-formatter/" class="related-btn">ตัวจัดรูปแบบ SQL</a><a
                        href="/th/password-generator/" class="related-btn">ตัวสร้างรหัสผ่าน</a>
                </div>
            </div>

        </div>
    </main>
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2025 Utilify. All rights reserved.</p>
            </div>
        </div>
    </footer>
    <script src="/assets/js/common.js"></script>
    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        document.getElementById('encodeBtn').addEventListener('click', () => {
            try {
                output.value = btoa(unescape(encodeURIComponent(input.value)));
            } catch (e) {
                alert('ข้อผิดพลาดการเข้ารหัส: ' + e.message);
            }
        });

        document.getElementById('decodeBtn').addEventListener('click', () => {
            try {
                output.value = decodeURIComponent(escape(atob(input.value)));
            } catch (e) {
                alert('ข้อผิดพลาดการถอดรหัส: ' + e.message);
            }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            if (output.value) Utils.copyToClipboard(output.value);
            else alert('ไม่มีอะไรให้คัดลอก');
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            input.value = '';
            output.value = '';
        });
    </script>
</body>

</html>
