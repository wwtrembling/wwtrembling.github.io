<!DOCTYPE html>
<html lang="{{ lang_code }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy-Report-Only" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data: blob:; font-src 'self' https: data:; connect-src 'self' https:; frame-src https:;">
    <meta name="google-adsense-account" content="ca-pub-6334819180242631">
    <title>{{ title }}</title>
    <meta name="description" content="{{ meta_desc }}">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="{{ meta_desc }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://utilifyapp.net/{{ lang_code }}/">

    <!-- Canonical -->
    <link rel="canonical" href="https://utilifyapp.net/{{ lang_code }}/">

    <!-- Language Alternatives -->
    {{ alternate_links }}

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/assets/css/main.css">

    <!-- JSON-LD -->
    <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Utilify",
    "url": "https://utilifyapp.net/",
    "inLanguage": "{{ lang_code }}",
    "description": "{{ meta_desc }}",
    "publisher": {
      "@type": "Organization",
      "name": "Utilify",
      "url": "https://utilifyapp.net/"
    }
  }
  </script>

    <style>
        .trust-strip {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: var(--spacing-md) var(--spacing-lg);
            margin: var(--spacing-md) 0 var(--spacing-xl);
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
        .trust-strip .trust-item { white-space: nowrap; }
        .trust-strip a { color: inherit; text-decoration: none; }
        .trust-strip a:hover { color: var(--primary-color); text-decoration: underline; }

        .featured-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }
        .featured-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            text-decoration: none;
            color: inherit;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }
        .featured-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-color);
        }
        .featured-card .card-icon { font-size: 2rem; }
        .featured-card .card-title { font-size: 1.05rem; margin: 0; }
        .featured-card .card-description { font-size: 0.85rem; color: var(--text-secondary); margin: 0; }

        .category-filter {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }
        .category-filter button {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 6px 14px;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.15s;
        }
        .category-filter button:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .category-filter button[aria-pressed="true"] {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .popular-conversions {
            margin: var(--spacing-xl) 0;
        }
        .popular-conv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: var(--spacing-sm);
        }
        .popular-conv-link {
            display: block;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.15s;
        }
        .popular-conv-link:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
    </style>

    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <a href="/{{ lang_code }}/" class="site-logo">
                    {{ brand }}
                </a>
            </div>
        </div>
    </header>

    <main class="main-content" id="main">
        <div class="container">
            <div class="hero">
                <h1>{{ brand }}</h1>
                <div class="security-badge"
                    style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                    <span title="Processed securely in client-side">{{ secure_badge }}</span>
                    <button id="pwaInstallBtn" class="btn btn-primary"
                        style="display: none; padding: 4px 12px; font-size: 12px;">{{ install_app }}</button>
                </div>

                <p>{{ hero_desc }}</p>
            </div>

            <div class="trust-strip" role="list">
                <span class="trust-item" role="listitem">{{ trust_client }}</span>
                <span class="trust-item" role="listitem"><a href="https://github.com/wwtrembling/wwtrembling.github.io" rel="noopener" target="_blank">{{ trust_oss }}</a></span>
                <span class="trust-item" role="listitem">{{ trust_langs }}</span>
                <span class="trust-item" role="listitem">{{ trust_pwa }}</span>
            </div>

            <h2 class="text-center mb-4">{{ h2_featured }}</h2>
            <div class="featured-grid">
          {{ featured_cards }}
            </div>

            <h2 class="text-center mb-4">{{ h2_tools }}</h2>

            <div class="category-filter" role="group" aria-label="Filter tools by category">
                <button type="button" data-cat="all" aria-pressed="true">{{ cat_all }}</button>
                <button type="button" data-cat="ai" aria-pressed="false">{{ cat_ai }}</button>
                <button type="button" data-cat="dev" aria-pressed="false">{{ cat_dev }}</button>
                <button type="button" data-cat="text" aria-pressed="false">{{ cat_text }}</button>
                <button type="button" data-cat="image" aria-pressed="false">{{ cat_image }}</button>
                <button type="button" data-cat="convert" aria-pressed="false">{{ cat_convert }}</button>
                <button type="button" data-cat="calc" aria-pressed="false">{{ cat_calc }}</button>
            </div>

            <div class="card-grid" id="toolGrid">
                {{ tool_cards }}
            </div>

            <section class="popular-conversions">
                <h2 class="text-center mb-4">{{ h2_popular_conv }}</h2>
                <div class="popular-conv-grid">
          {{ popular_conversions }}
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <p>{{ footer }}</p>
            </div>
        </div>
    </footer>

    <script src="/assets/js/common.js"></script>
    <script>
        // Category filter — pure DOM, no library.
        (function () {
            const buttons = document.querySelectorAll('.category-filter button');
            const cards = document.querySelectorAll('#toolGrid .card');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const cat = btn.dataset.cat;
                    buttons.forEach(b => b.setAttribute('aria-pressed', b === btn ? 'true' : 'false'));
                    cards.forEach(card => {
                        const match = cat === 'all' || card.dataset.category === cat;
                        card.style.display = match ? '' : 'none';
                    });
                });
            });
        })();
    </script>
</body>

</html>
