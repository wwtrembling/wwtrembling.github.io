<!DOCTYPE html>
<html lang="{{ lang_code }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy-Report-Only" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data: blob:; font-src 'self' https: data:; connect-src 'self' https:; frame-src https:;">
    <meta name="google-adsense-account" content="ca-pub-6334819180242631">
    <title>{{ meta_title }}</title>
    <meta name="description" content="{{ meta_desc }}">
    <link rel="canonical" href="https://utilifyapp.net/{{ lang_code }}/unix-timestamp/">

    <meta property="og:title" content="{{ meta_title }}">
    <meta property="og:description" content="{{ meta_desc }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://utilifyapp.net/{{ lang_code }}/unix-timestamp/">

    {{ alternate_links }}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "{{ json_name }}",
        "description": "{{ json_desc }}",
        "url": "https://utilifyapp.net/{{ lang_code }}/unix-timestamp/",
        "inLanguage": "{{ lang_code }}",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <style>
        .ts-section {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }
        .ts-output {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-top: var(--spacing-sm);
            font-family: var(--font-mono);
            font-size: 0.95rem;
        }
        .ts-output strong { display: block; margin-bottom: 4px; color: var(--text-secondary); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; }
        .now-display {
            text-align: center;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            font-family: var(--font-mono);
        }
        .now-display .now-value { font-size: 1.5rem; font-weight: 600; }
    </style>
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content"><a href="/{{ lang_code }}/" class="site-logo">{{ brand }}</a></div>
        </div>
    </header>
    <main class="main-content">
        <div class="container-narrow">
            <h1>⏲️ {{ title }}</h1>
            <div class="security-badge"
                style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                <span title="Processed securely in client-side">{{ secure_badge }}</span>
                <button id="pwaInstallBtn" class="btn btn-primary"
                    style="display: none; padding: 4px 12px; font-size: 12px;">{{ install_app }}</button>
            </div>
            <p>{{ page_desc }}</p>

            <div class="now-display">
                <div style="font-size: 0.875rem; color: var(--text-secondary);">{{ label_now }}</div>
                <div class="now-value" id="nowSec">—</div>
                <div style="font-size: 0.875rem;" id="nowIso">—</div>
            </div>

            <div class="ts-section">
                <label class="form-label">{{ label_ts_input }}</label>
                <input type="text" id="tsInput" class="form-input" placeholder="{{ ph_ts_input }}">
                <div class="btn-group" style="margin-top: var(--spacing-sm);">
                    <button class="btn btn-primary" id="convertTsBtn">{{ btn_convert_ts }}</button>
                    <button class="btn btn-secondary" id="useNowBtn">{{ btn_use_now }}</button>
                </div>
                <div class="ts-output" id="tsOutUtc"><strong>UTC</strong><span>—</span></div>
                <div class="ts-output" id="tsOutLocal"><strong>{{ label_local }}</strong><span>—</span></div>
            </div>

            <div class="ts-section">
                <label class="form-label">{{ label_date_input }}</label>
                <input type="text" id="dateInput" class="form-input" placeholder="{{ ph_date_input }}">
                <div class="btn-group" style="margin-top: var(--spacing-sm);">
                    <button class="btn btn-primary" id="convertDateBtn">{{ btn_convert_date }}</button>
                </div>
                <div class="ts-output" id="dateOutSec"><strong>{{ label_seconds }}</strong><span>—</span></div>
                <div class="ts-output" id="dateOutMs"><strong>{{ label_ms }}</strong><span>—</span></div>
            </div>

            <div class="related-tools-section">
                <h3>{{ related_header }}</h3>
                <div class="related-buttons">
                    <a href="/{{ lang_code }}/date-calculator/" class="related-btn">{{ related_date }}</a><a
                        href="/{{ lang_code }}/timer/" class="related-btn">{{ related_timer }}</a><a
                        href="/{{ lang_code }}/jwt-decoder/" class="related-btn">{{ related_jwt }}</a>
                </div>
            </div>
        </div>
    </main>
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content"><p>{{ footer }}</p></div>
        </div>
    </footer>

    <script src="/assets/js/common.js"></script>
    <script>
        const nowSecEl = document.getElementById('nowSec');
        const nowIsoEl = document.getElementById('nowIso');
        const tsInput = document.getElementById('tsInput');
        const dateInput = document.getElementById('dateInput');

        function pad(n) { return String(n).padStart(2, '0'); }
        function localPretty(d) {
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
                + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        }

        function tickNow() {
            const now = Math.floor(Date.now() / 1000);
            nowSecEl.textContent = now;
            nowIsoEl.textContent = new Date().toISOString();
        }
        tickNow();
        setInterval(tickNow, 1000);

        function setSpan(elId, value) {
            document.getElementById(elId).querySelector('span').textContent = value;
        }

        document.getElementById('convertTsBtn').addEventListener('click', () => {
            const raw = tsInput.value.trim();
            if (!raw) {
                setSpan('tsOutUtc', '—');
                setSpan('tsOutLocal', '—');
                return;
            }
            let n = Number(raw);
            if (!Number.isFinite(n)) {
                setSpan('tsOutUtc', '{{ alert_invalid_ts }}');
                setSpan('tsOutLocal', '');
                return;
            }
            // Detect ms vs seconds: any value >= 1e12 is ms.
            const ms = Math.abs(n) >= 1e12 ? n : n * 1000;
            const d = new Date(ms);
            if (isNaN(d.getTime())) {
                setSpan('tsOutUtc', '{{ alert_invalid_ts }}');
                setSpan('tsOutLocal', '');
                return;
            }
            setSpan('tsOutUtc', d.toISOString());
            setSpan('tsOutLocal', localPretty(d) + ' (' + Intl.DateTimeFormat().resolvedOptions().timeZone + ')');
        });

        document.getElementById('useNowBtn').addEventListener('click', () => {
            tsInput.value = Math.floor(Date.now() / 1000);
            document.getElementById('convertTsBtn').click();
        });

        document.getElementById('convertDateBtn').addEventListener('click', () => {
            const raw = dateInput.value.trim();
            if (!raw) {
                setSpan('dateOutSec', '—');
                setSpan('dateOutMs', '—');
                return;
            }
            const d = new Date(raw);
            if (isNaN(d.getTime())) {
                setSpan('dateOutSec', '{{ alert_invalid_date }}');
                setSpan('dateOutMs', '');
                return;
            }
            const ms = d.getTime();
            setSpan('dateOutSec', String(Math.floor(ms / 1000)));
            setSpan('dateOutMs', String(ms));
        });
    </script>
</body>

</html>
