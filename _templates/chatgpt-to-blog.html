<!DOCTYPE html>
<html lang="{{ lang_code }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-6334819180242631">
    <title>{{ meta_title }}</title>
    <meta name="description" content="{{ meta_desc }}">
    <link rel="canonical" href="https://utilifyapp.net/{{ lang_code }}/chatgpt-to-blog/">

    <meta property="og:title" content="{{ meta_title }}">
    <meta property="og:description" content="{{ meta_desc }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://utilifyapp.net/{{ lang_code }}/chatgpt-to-blog/">

    {{ alternate_links }}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "{{ json_name }}",
        "description": "{{ json_desc }}",
        "url": "https://utilifyapp.net/{{ lang_code }}/chatgpt-to-blog/",
        "inLanguage": "{{ lang_code }}",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <style>
        .conv-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
            margin-top: var(--spacing-lg);
        }
        @media (max-width: 768px) { .conv-grid { grid-template-columns: 1fr; } }

        .options-row {
            display: flex; flex-wrap: wrap; gap: var(--spacing-md);
            margin: var(--spacing-md) 0;
            font-size: 0.95rem;
        }
        .options-row label { display: inline-flex; align-items: center; gap: 6px; }
        .options-row input[type="text"] { width: 220px; padding: 4px 8px; }
    </style>
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <header class="site-header"><div class="container"><div class="header-content"><a href="/{{ lang_code }}/" class="site-logo">{{ brand }}</a></div></div></header>
    <main class="main-content">
        <div class="container-narrow">
            <h1>📝 {{ title }}</h1>
            <div class="security-badge" style="display:flex;align-items:center;justify-content:center;gap:8px;margin:10px 0;font-size:14px;color:var(--text-secondary);">
                <span>{{ secure_badge }}</span>
            </div>

            <p>{{ page_desc }}</p>

            <div class="options-row">
                <label><input type="checkbox" id="optStripPrompts" checked> {{ opt_strip_prompts }}</label>
                <label><input type="checkbox" id="optMergeAssistant" checked> {{ opt_merge }}</label>
                <label><input type="checkbox" id="optAddTitle"> {{ opt_add_title }}</label>
                <label>{{ label_title }}: <input type="text" id="postTitle" placeholder="My Conversation"></label>
            </div>

            <div class="conv-grid">
                <div>
                    <label class="form-label" for="inputEl">{{ label_input }}</label>
                    <textarea id="inputEl" class="form-input" style="min-height:340px;font-family:var(--font-mono);" placeholder="{{ ph_input }}"></textarea>
                </div>
                <div>
                    <label class="form-label" for="outputEl">{{ label_output }}</label>
                    <textarea id="outputEl" class="form-input" style="min-height:340px;font-family:var(--font-mono);" readonly aria-live="polite"></textarea>
                </div>
            </div>

            <div class="btn-group" style="margin-top: var(--spacing-md);">
                <button class="btn btn-primary" id="convertBtn">{{ btn_convert }}</button>
                <button class="btn btn-secondary" id="copyBtn">{{ btn_copy }}</button>
                <button class="btn btn-secondary" id="downloadBtn">{{ btn_download }}</button>
                <button class="btn btn-secondary" id="clearBtn">{{ btn_clear }}</button>
            </div>

            <h2>{{ howto_header }}</h2>
            <div class="howto-content">{{ howto_html }}</div>

            <div class="related-tools-section">
                <h3>{{ related_header }}</h3>
                <div class="related-buttons">
                    <a href="/{{ lang_code }}/markdown-previewer/" class="related-btn">{{ related_md }}</a><a
                        href="/{{ lang_code }}/token-counter/" class="related-btn">{{ related_token }}</a><a
                        href="/{{ lang_code }}/prompt-pii-scrubber/" class="related-btn">{{ related_pii }}</a>
                </div>
            </div>
        </div>
    </main>
    <footer class="site-footer"><div class="container"><div class="footer-content"><p>{{ footer }}</p></div></div></footer>
    <script src="/assets/js/common.js"></script>
    <script>
        const inputEl = document.getElementById('inputEl');
        const outputEl = document.getElementById('outputEl');

        // Heuristics: ChatGPT shared/exported text typically alternates "You said:" / "ChatGPT said:" labels,
        // or in JSON exports has role:"user" / role:"assistant". Try both.
        const ROLE_PATTERNS = [
            /^(?:You|User|Q|Question|사용자)(?:\s*said)?\s*:?\s*$/im,
            /^(?:ChatGPT|Assistant|AI|A|Answer|어시스턴트|GPT)(?:\s*said)?\s*:?\s*$/im,
        ];

        function tryParseJSON(text) {
            try {
                const data = JSON.parse(text);
                // ChatGPT export shape: array of { mapping: {...} } or single conversation object.
                const arr = Array.isArray(data) ? data : [data];
                const turns = [];
                for (const conv of arr) {
                    if (conv.mapping) {
                        for (const node of Object.values(conv.mapping)) {
                            if (node && node.message && node.message.author && node.message.content) {
                                const role = node.message.author.role;
                                const parts = node.message.content.parts || [];
                                const txt = parts.filter(p => typeof p === 'string').join('\n').trim();
                                if (role && txt && (role === 'user' || role === 'assistant')) {
                                    turns.push({ role, text: txt, ts: node.message.create_time || 0 });
                                }
                            }
                        }
                    } else if (Array.isArray(conv.messages)) {
                        for (const m of conv.messages) {
                            if (m.role && m.content) turns.push({ role: m.role, text: typeof m.content === 'string' ? m.content : '', ts: 0 });
                        }
                    }
                }
                turns.sort((a, b) => a.ts - b.ts);
                return turns.length ? turns : null;
            } catch (e) {
                return null;
            }
        }

        function parsePlainText(text) {
            // Split on lines that look like role labels.
            const lines = text.split('\n');
            const turns = [];
            let current = { role: null, lines: [] };
            for (const line of lines) {
                if (ROLE_PATTERNS[0].test(line)) {
                    if (current.role && current.lines.length) turns.push({ role: current.role, text: current.lines.join('\n').trim() });
                    current = { role: 'user', lines: [] };
                } else if (ROLE_PATTERNS[1].test(line)) {
                    if (current.role && current.lines.length) turns.push({ role: current.role, text: current.lines.join('\n').trim() });
                    current = { role: 'assistant', lines: [] };
                } else {
                    current.lines.push(line);
                }
            }
            if (current.role && current.lines.length) turns.push({ role: current.role, text: current.lines.join('\n').trim() });
            // If we found no role markers, treat whole input as a single assistant message.
            if (turns.length === 0 && text.trim()) {
                turns.push({ role: 'assistant', text: text.trim() });
            }
            return turns.filter(t => t.text);
        }

        function toMarkdown(turns) {
            const stripPrompts = document.getElementById('optStripPrompts').checked;
            const mergeAssistant = document.getElementById('optMergeAssistant').checked;
            const addTitle = document.getElementById('optAddTitle').checked;
            const title = document.getElementById('postTitle').value.trim() || 'Conversation';

            let md = '';
            if (addTitle) md += '# ' + title + '\n\n';
            if (mergeAssistant) {
                const assistantTurns = turns.filter(t => t.role === 'assistant').map(t => t.text);
                if (stripPrompts) {
                    md += assistantTurns.join('\n\n');
                } else {
                    md += turns.map(t => (t.role === 'user' ? '> **Q:** ' + t.text.replace(/\n/g, '\n> ') : t.text)).join('\n\n');
                }
            } else {
                md += turns.map(t => (t.role === 'user' ? '## Q\n\n' + t.text : '## A\n\n' + t.text)).join('\n\n');
            }
            return md.trim();
        }

        function convert() {
            const text = inputEl.value;
            if (!text.trim()) { outputEl.value = ''; return; }
            const turns = tryParseJSON(text) || parsePlainText(text);
            outputEl.value = toMarkdown(turns);
        }

        function download() {
            const blob = new Blob([outputEl.value], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'post.md';
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        document.getElementById('convertBtn').addEventListener('click', convert);
        document.getElementById('copyBtn').addEventListener('click', () => {
            if (outputEl.value) Utils.copyToClipboard(outputEl.value);
            else Utils.showToast('{{ alert_copy_empty }}');
        });
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!outputEl.value) convert();
            if (outputEl.value) download();
        });
        document.getElementById('clearBtn').addEventListener('click', () => { inputEl.value = ''; outputEl.value = ''; });
        ['optStripPrompts','optMergeAssistant','optAddTitle','postTitle'].forEach(id =>
            document.getElementById(id).addEventListener('change', () => { if (inputEl.value) convert(); })
        );
    </script>
</body>

</html>
