<!DOCTYPE html>
<html lang="{{ lang_code }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy-Report-Only" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data: blob:; font-src 'self' https: data:; connect-src 'self' https:; frame-src https:;">
    <meta name="google-adsense-account" content="ca-pub-6334819180242631">
    <title>{{ meta_title }}</title>
    <meta name="description" content="{{ meta_desc }}">
    <link rel="canonical" href="https://utilifyapp.net/{{ lang_code }}/{{ hub_slug }}/">

    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:description" content="{{ og_desc }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://utilifyapp.net/{{ lang_code }}/{{ hub_slug }}/">

    {{ alternate_links }}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "{{ json_name }}",
        "description": "{{ json_desc }}",
        "url": "https://utilifyapp.net/{{ lang_code }}/{{ hub_slug }}/",
        "inLanguage": "{{ lang_code }}"
    }
    </script>
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <header class="site-header"><div class="container"><div class="header-content"><a href="/{{ lang_code }}/" class="site-logo">{{ brand }}</a></div></div></header>
    <main class="main-content">
        <div class="container-narrow">
            <h1>{{ hub_icon }} {{ h1 }}</h1>

            <div class="page-intro">{{ intro_html }}</div>

            <h2>{{ tools_header }}</h2>
            <div class="hub-tool-grid">
                {{ tool_cards_html }}
            </div>

            <h2>{{ faq_header }}</h2>
            <div class="hub-faq">{{ faq_html }}</div>

            <div class="related-tools-section">
                <h3>{{ related_header }}</h3>
                <div class="related-buttons">
                    <a href="/{{ lang_code }}/{{ other_hub_slug }}/" class="related-btn">{{ related_other_hub }}</a><a
                        href="/{{ lang_code }}/bmi-calculator/" class="related-btn">{{ related_bmi }}</a><a
                        href="/{{ lang_code }}/date-calculator/" class="related-btn">{{ related_date }}</a><a
                        href="/{{ lang_code }}/unit-converter/" class="related-btn">{{ related_unit }}</a>
                </div>
            </div>
        </div>
    </main>
    <footer class="site-footer"><div class="container"><div class="footer-content"><p>{{ footer }}</p></div></div></footer>
    <script src="/assets/js/common.js"></script>
</body>

</html>
