<!DOCTYPE html>
<html lang="{{ lang_code }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy-Report-Only" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data: blob:; font-src 'self' https: data:; connect-src 'self' https:; frame-src https:;">
    <!-- Ezoic -->
    <script data-cfasync="false" src="https://cmp.gatekeeperconsent.com/min.js"></script>
    <script data-cfasync="false" src="https://the.gatekeeperconsent.com/cmp.min.js"></script>
    <script async src="https://www.ezojs.com/ezoic/sa.min.js"></script>
    <script>
        window.ezstandalone = window.ezstandalone || {};
        ezstandalone.cmd = ezstandalone.cmd || [];
    </script>
    <script src="https://ezoicanalytics.com/analytics.js"></script>
    <meta name="google-adsense-account" content="ca-pub-6334819180242631">
    <title>{{ meta_title }}</title>
    <meta name="description" content="{{ meta_desc }}">
    <link rel="canonical" href="https://utilifyapp.net/{{ lang_code }}/convert/{{ pair_slug }}/">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ meta_title }}">
    <meta property="og:description" content="{{ meta_desc }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://utilifyapp.net/{{ lang_code }}/convert/{{ pair_slug }}/">

    <!-- Language Alternatives -->
    {{ alternate_links }}

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/assets/css/main.css">

    <!-- WebApplication JSON-LD -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "{{ h1_text }}",
        "description": "{{ meta_desc }}",
        "url": "https://utilifyapp.net/{{ lang_code }}/convert/{{ pair_slug }}/",
        "inLanguage": "{{ lang_code }}",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <!-- FAQ JSON-LD -->
    <script type="application/ld+json">
    {{ faq_jsonld }}
    </script>

    <style>
        .conv-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: var(--spacing-lg);
            align-items: end;
            margin: var(--spacing-lg) 0;
        }

        .conv-grid .swap {
            font-size: 1.5rem;
            text-align: center;
            padding: 0 var(--spacing-md);
            user-select: none;
        }

        .formula-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin: var(--spacing-md) 0;
            font-family: var(--font-mono);
            font-size: 1.05rem;
        }

        table.conv-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: var(--spacing-md);
            font-variant-numeric: tabular-nums;
        }

        table.conv-table th, table.conv-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            text-align: right;
        }

        table.conv-table th {
            background: var(--bg-secondary);
            font-weight: 600;
        }

        details.faq {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin: var(--spacing-md) 0;
        }

        details.faq summary {
            cursor: pointer;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .conv-grid { grid-template-columns: 1fr; }
            .conv-grid .swap { display: none; }
        }
    </style>
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content"><a href="/{{ lang_code }}/" class="site-logo">{{ brand }}</a></div>
        </div>
    </header>
    <main class="main-content">
        <div class="container-narrow">
            <h1>{{ h1_text }}</h1>

            <p>{{ intro_text }}</p>

            <div class="conv-grid">
                <div>
                    <label class="form-label">{{ from_long }}</label>
                    <input id="fromInput" class="form-input" type="number" step="any" value="1">
                </div>
                <div class="swap">→</div>
                <div>
                    <label class="form-label">{{ to_long }}</label>
                    <input id="toInput" class="form-input" type="number" step="any" readonly>
                </div>
            </div>

            <div class="formula-box"><strong>{{ formula_label }}</strong> {{ formula }}</div>

            <h2>{{ table_title }}</h2>
            <table class="conv-table">
                <thead>
                    <tr><th>{{ from_long }}</th><th>{{ to_long }}</th></tr>
                </thead>
                <tbody>
                    {{ table_rows_html }}
                </tbody>
            </table>

            <h2>{{ faq_title }}</h2>
            {{ faq_html }}

            <div class="related-tools-section">
                <h3>{{ related_header }}</h3>
                <div class="related-buttons">
                    <a href="/{{ lang_code }}/unit-converter/" class="related-btn">{{ related_main }}</a>
                    {{ related_pairs_html }}
                </div>
            </div>
        </div>
    </main>
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content"><p>{{ footer }}</p></div>
        </div>
    </footer>
    <script src="/assets/js/common.js"></script>
    <script>
        const fromInput = document.getElementById('fromInput');
        const toInput = document.getElementById('toInput');
        const MODE = '{{ mode }}';
        const FACTOR = {{ factor_js }};
        const PRECISION = {{ precision }};

        function convert(v) {
            if (MODE === 'linear') return v * FACTOR;
            if (MODE === 'temp_c_to_f') return (v * 9 / 5) + 32;
            if (MODE === 'temp_f_to_c') return (v - 32) * 5 / 9;
            return v;
        }

        function trimZeros(s) {
            if (!s.includes('.')) return s;
            return s.replace(/0+$/, '').replace(/\.$/, '');
        }

        function update() {
            const v = parseFloat(fromInput.value);
            if (isNaN(v)) { toInput.value = ''; return; }
            toInput.value = trimZeros(convert(v).toFixed(PRECISION));
        }

        fromInput.addEventListener('input', update);
        update();
    </script>
</body>

</html>
