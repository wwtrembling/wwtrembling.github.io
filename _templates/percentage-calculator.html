<!DOCTYPE html>
<html lang="{{ lang_code }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-6334819180242631">
    <title>{{ meta_title }}</title>
    <meta name="description" content="{{ meta_desc }}">
    <link rel="canonical" href="https://utilifyapp.net/{{ lang_code }}/percentage-calculator/">

    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:description" content="{{ og_desc }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://utilifyapp.net/{{ lang_code }}/percentage-calculator/">

    {{ alternate_links }}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "{{ json_name }}",
        "description": "{{ json_desc }}",
        "url": "https://utilifyapp.net/{{ lang_code }}/percentage-calculator/",
        "inLanguage": "{{ lang_code }}",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: var(--spacing-md);
        }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .result-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            text-align: center;
            margin: var(--spacing-md) 0;
        }
        .result-card .label { font-size: 0.85rem; color: var(--text-secondary); }
        .result-card .value { font-size: 2rem; font-weight: 700; color: var(--primary-color); margin-top: 4px; font-variant-numeric: tabular-nums; }
        .button-row { display: flex; gap: var(--spacing-sm); flex-wrap: wrap; }
        .button-row .btn { min-width: 120px; }
    </style>
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <header class="site-header"><div class="container"><div class="header-content"><a href="/{{ lang_code }}/" class="site-logo">{{ brand }}</a></div></div></header>
    <main class="main-content">
        <div class="container-narrow">
            <h1>％ {{ title }}</h1>
            <div class="security-badge" style="display:flex;align-items:center;justify-content:center;gap:8px;margin:10px 0;font-size:14px;color:var(--text-secondary);">
                <span>{{ secure_badge }}</span>
                <button id="pwaInstallBtn" class="btn btn-primary" style="display: none; padding: 4px 12px; font-size: 12px;">{{ install_app }}</button>
            </div>

            <p>{{ page_desc }}</p>

            <div class="card">
                <div class="form-group">
                    <label class="form-label" for="mode">{{ label_mode }}</label>
                    <select id="mode" class="form-input">
                        <option value="of" selected>{{ opt_of }}</option>
                        <option value="is">{{ opt_is }}</option>
                        <option value="change">{{ opt_change }}</option>
                    </select>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="a">{{ label_a }}</label>
                        <input type="number" id="a" class="form-input" inputmode="decimal" step="any" placeholder="{{ ph_a }}" value="{{ ph_a }}">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="b">{{ label_b }}</label>
                        <input type="number" id="b" class="form-input" inputmode="decimal" step="any" placeholder="{{ ph_b }}" value="{{ ph_b }}">
                    </div>
                </div>
                <div class="button-row" style="margin-top: var(--spacing-md);">
                    <button class="btn btn-primary" type="button" onclick="calculate()">{{ btn_calculate }}</button>
                    <button class="btn" type="button" onclick="resetForm()">{{ btn_reset }}</button>
                </div>
            </div>

            <div id="result" style="display:none;" aria-live="polite">
                <div class="result-card">
                    <div class="label">{{ res_label }}</div>
                    <div class="value" id="resultVal">—</div>
                </div>
                <div class="button-row">
                    <button class="btn" type="button" onclick="shareResult()">{{ btn_share }}</button>
                </div>
            </div>

            <h2>{{ howto_header }}</h2>
            <div class="howto-content">{{ howto_html }}</div>

            <div class="related-tools-section">
                <h3>{{ related_header }}</h3>
                <div class="related-buttons">
                    <a href="/{{ lang_code }}/tip-calculator/" class="related-btn">{{ related_tip }}</a><a
                        href="/{{ lang_code }}/discount-calculator/" class="related-btn">{{ related_discount }}</a><a
                        href="/{{ lang_code }}/unit-converter/" class="related-btn">{{ related_unit }}</a><a
                        href="/{{ lang_code }}/date-calculator/" class="related-btn">{{ related_date }}</a>
                </div>
            </div>
        </div>
    </main>
    <footer class="site-footer"><div class="container"><div class="footer-content"><p>{{ footer }}</p></div></div></footer>
    <script src="/assets/js/common.js"></script>
    <script>
        const LOCALE = document.documentElement.lang || 'en';
        const fmt = n => Number(n).toLocaleString(LOCALE, { maximumFractionDigits: 4 });

        function calculate() {
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            const mode = document.getElementById('mode').value;
            if (!Number.isFinite(a) || !Number.isFinite(b)) {
                alert('{{ alert_invalid }}');
                return;
            }
            let value;
            if (mode === 'of') {
                value = (a / 100) * b;
                document.getElementById('resultVal').textContent = fmt(value);
            } else if (mode === 'is') {
                if (b === 0) { alert('{{ alert_div_zero }}'); return; }
                value = (a / b) * 100;
                document.getElementById('resultVal').textContent = fmt(value) + ' %';
            } else {
                if (a === 0) { alert('{{ alert_div_zero }}'); return; }
                value = ((b - a) / a) * 100;
                const sign = value > 0 ? '+' : '';
                document.getElementById('resultVal').textContent = sign + fmt(value) + ' %';
            }
            document.getElementById('result').style.display = 'block';
        }

        function resetForm() {
            document.getElementById('mode').value = 'of';
            document.getElementById('a').value = '{{ ph_a }}';
            document.getElementById('b').value = '{{ ph_b }}';
            document.getElementById('result').style.display = 'none';
        }

        async function shareResult() {
            const v = document.getElementById('resultVal').textContent;
            if (v === '—') return;
            const text = '{{ share_text }}'.replace('{value}', v) + ' ' + location.href;
            if (navigator.share) {
                try { await navigator.share({ title: '{{ title }}', text }); return; }
                catch (e) { if (e && e.name === 'AbortError') return; }
            }
            try {
                await navigator.clipboard.writeText(text);
                alert('{{ share_copied }}');
            } catch (e) { /* clipboard blocked */ }
        }
    </script>
</body>

</html>
