<!DOCTYPE html>
<html lang="{{ lang_code }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy-Report-Only" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data: blob:; font-src 'self' https: data:; connect-src 'self' https:; frame-src https:;">
    <meta name="google-adsense-account" content="ca-pub-6334819180242631">
    <title>{{ meta_title }}</title>
    <meta name="description" content="{{ meta_desc }}">
    <link rel="canonical" href="https://utilifyapp.net/{{ lang_code }}/prompt-pii-scrubber/">

    <meta property="og:title" content="{{ meta_title }}">
    <meta property="og:description" content="{{ meta_desc }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://utilifyapp.net/{{ lang_code }}/prompt-pii-scrubber/">

    {{ alternate_links }}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/assets/css/main.css">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "{{ json_name }}",
        "description": "{{ json_desc }}",
        "url": "https://utilifyapp.net/{{ lang_code }}/prompt-pii-scrubber/",
        "inLanguage": "{{ lang_code }}",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <style>
        .pii-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-lg);
            margin-top: var(--spacing-lg);
        }
        @media (max-width: 768px) { .pii-grid { grid-template-columns: 1fr; } }

        .pii-summary {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-top: var(--spacing-md);
        }
        .pii-summary ul { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: var(--spacing-md); }
        .pii-summary li { font-family: var(--font-mono); font-size: 0.9rem; }
        .pii-summary .count { font-weight: 700; color: var(--primary-color); margin-left: 6px; }

        .pii-options {
            display: flex; flex-wrap: wrap; gap: var(--spacing-md);
            margin: var(--spacing-md) 0;
        }
        .pii-options label { display: inline-flex; align-items: center; gap: 6px; font-size: 0.95rem; }
    </style>
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <header class="site-header">
        <div class="container"><div class="header-content"><a href="/{{ lang_code }}/" class="site-logo">{{ brand }}</a></div></div>
    </header>
    <main class="main-content">
        <div class="container-narrow">
            <h1>🛡️ {{ title }}</h1>
            <div class="security-badge" style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                <span title="Processed securely in client-side">{{ secure_badge }}</span>
            </div>

            <p>{{ page_desc }}</p>

            <div class="pii-options">
                <label><input type="checkbox" data-pii="email" checked> {{ opt_email }}</label>
                <label><input type="checkbox" data-pii="phone" checked> {{ opt_phone }}</label>
                <label><input type="checkbox" data-pii="ssn" checked> {{ opt_ssn }}</label>
                <label><input type="checkbox" data-pii="card" checked> {{ opt_card }}</label>
                <label><input type="checkbox" data-pii="apikey" checked> {{ opt_apikey }}</label>
                <label><input type="checkbox" data-pii="ip" checked> {{ opt_ip }}</label>
                <label><input type="checkbox" data-pii="url" checked> {{ opt_url }}</label>
            </div>

            <div class="pii-grid">
                <div>
                    <label class="form-label" for="inputEl">{{ label_input }}</label>
                    <textarea id="inputEl" class="form-input" style="min-height:260px;font-family:var(--font-mono);" placeholder="{{ ph_input }}"></textarea>
                </div>
                <div>
                    <label class="form-label" for="outputEl">{{ label_output }}</label>
                    <textarea id="outputEl" class="form-input" style="min-height:260px;font-family:var(--font-mono);" readonly aria-live="polite"></textarea>
                </div>
            </div>

            <div class="btn-group" style="margin-top: var(--spacing-md);">
                <button class="btn btn-primary" id="scrubBtn">{{ btn_scrub }}</button>
                <button class="btn btn-secondary" id="copyBtn">{{ btn_copy }}</button>
                <button class="btn btn-secondary" id="clearBtn">{{ btn_clear }}</button>
            </div>

            <div id="summaryBox" class="pii-summary" hidden aria-live="polite">
                <strong>{{ summary_label }}</strong>
                <ul id="summaryList"></ul>
            </div>

            <h2>{{ howto_header }}</h2>
            <div class="howto-content">{{ howto_html }}</div>

            <div class="related-tools-section">
                <h3>{{ related_header }}</h3>
                <div class="related-buttons">
                    <a href="/{{ lang_code }}/token-counter/" class="related-btn">{{ related_token }}</a><a
                        href="/{{ lang_code }}/claude-md-generator/" class="related-btn">{{ related_claude }}</a><a
                        href="/{{ lang_code }}/mcp-config-generator/" class="related-btn">{{ related_mcp }}</a>
                </div>
            </div>
        </div>
    </main>
    <footer class="site-footer"><div class="container"><div class="footer-content"><p>{{ footer }}</p></div></div></footer>
    <script src="/assets/js/common.js"></script>
    <script>
        const inputEl = document.getElementById('inputEl');
        const outputEl = document.getElementById('outputEl');
        const summaryBox = document.getElementById('summaryBox');
        const summaryList = document.getElementById('summaryList');
        const labels = {
            email: '{{ opt_email }}', phone: '{{ opt_phone }}', ssn: '{{ opt_ssn }}',
            card: '{{ opt_card }}', apikey: '{{ opt_apikey }}', ip: '{{ opt_ip }}', url: '{{ opt_url }}',
        };

        const PATTERNS = {
            email:  /\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b/g,
            phone:  /(?:\+?\d{1,3}[\s.-]?)?(?:\(?\d{2,4}\)?[\s.-]?){2,4}\d{2,4}\b/g,
            ssn:    /\b\d{3}-\d{2}-\d{4}\b|\b\d{6}-\d{7}\b/g,
            card:   /\b(?:\d[ -]?){13,19}\b/g,
            apikey: /\b(?:sk|pk|rk)-[A-Za-z0-9_-]{16,}\b|\bAKIA[0-9A-Z]{16}\b|\bAIza[0-9A-Za-z_-]{35}\b|\bgithub_pat_[A-Za-z0-9_]{20,}\b|\bxox[abporsu]-[A-Za-z0-9-]{10,}\b/g,
            ip:     /\b(?:(?:25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|1?\d?\d)\b/g,
            url:    /https?:\/\/[^\s<>"]+/g,
        };

        function luhn(s) {
            const digits = s.replace(/\D/g, '');
            if (digits.length < 13 || digits.length > 19) return false;
            let sum = 0, alt = false;
            for (let i = digits.length - 1; i >= 0; i--) {
                let n = +digits[i];
                if (alt) { n *= 2; if (n > 9) n -= 9; }
                sum += n;
                alt = !alt;
            }
            return sum % 10 === 0;
        }

        function scrub() {
            const text = inputEl.value;
            const enabled = {};
            document.querySelectorAll('[data-pii]').forEach(cb => enabled[cb.dataset.pii] = cb.checked);
            const counts = {};
            let out = text;
            for (const [kind, re] of Object.entries(PATTERNS)) {
                if (!enabled[kind]) continue;
                const placeholder = '[' + kind.toUpperCase() + ']';
                const matches = [];
                out = out.replace(re, (m) => {
                    if (kind === 'card' && !luhn(m)) return m;
                    matches.push(m);
                    return placeholder;
                });
                if (matches.length) counts[kind] = matches.length;
            }
            outputEl.value = out;
            summaryList.innerHTML = '';
            const total = Object.values(counts).reduce((a, b) => a + b, 0);
            if (total === 0) {
                summaryBox.hidden = false;
                summaryList.innerHTML = '<li>{{ alert_no_pii }}</li>';
                return;
            }
            for (const [k, n] of Object.entries(counts)) {
                const li = document.createElement('li');
                li.innerHTML = labels[k] + '<span class="count">' + n + '</span>';
                summaryList.appendChild(li);
            }
            summaryBox.hidden = false;
        }

        document.getElementById('scrubBtn').addEventListener('click', scrub);
        document.getElementById('copyBtn').addEventListener('click', () => {
            if (outputEl.value) Utils.copyToClipboard(outputEl.value);
            else Utils.showToast('{{ alert_copy_empty }}');
        });
        document.getElementById('clearBtn').addEventListener('click', () => {
            inputEl.value = ''; outputEl.value = '';
            summaryBox.hidden = true;
        });
        inputEl.addEventListener('input', Utils.debounce(scrub, 400));
    </script>
</body>

</html>
