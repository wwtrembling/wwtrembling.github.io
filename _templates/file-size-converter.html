<!DOCTYPE html>
<html lang="{{ lang_code }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy-Report-Only" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data: blob:; font-src 'self' https: data:; connect-src 'self' https:; frame-src https:;">
    <meta name="google-adsense-account" content="ca-pub-6334819180242631">
    <title>{{ meta_title }}</title>
    <meta name="description" content="{{ meta_desc }}">
    <link rel="canonical" href="https://utilifyapp.net/{{ lang_code }}/file-size-converter/">

    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:description" content="{{ og_desc }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://utilifyapp.net/{{ lang_code }}/file-size-converter/">

    {{ alternate_links }}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "{{ json_name }}",
        "description": "{{ json_desc }}",
        "url": "https://utilifyapp.net/{{ lang_code }}/file-size-converter/",
        "inLanguage": "{{ lang_code }}",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--spacing-md);
        }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .result-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            text-align: center;
            margin: var(--spacing-md) 0;
        }
        .result-card .label { font-size: 0.85rem; color: var(--text-secondary); }
        .result-card .value { font-size: 2rem; font-weight: 700; color: var(--primary-color); margin-top: 4px; font-variant-numeric: tabular-nums; word-break: break-all; }
        .button-row { display: flex; gap: var(--spacing-sm); flex-wrap: wrap; }
        .button-row .btn { min-width: 110px; }
    </style>
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <header class="site-header"><div class="container"><div class="header-content"><a href="/{{ lang_code }}/" class="site-logo">{{ brand }}</a></div></div></header>
    <main class="main-content">
        <div class="container-narrow">
            <h1>💾 {{ title }}</h1>
            <div class="security-badge" style="display:flex;align-items:center;justify-content:center;gap:8px;margin:10px 0;font-size:14px;color:var(--text-secondary);">
                <span>{{ secure_badge }}</span>
                <button id="pwaInstallBtn" class="btn btn-primary" style="display: none; padding: 4px 12px; font-size: 12px;">{{ install_app }}</button>
            </div>

            <p>{{ page_desc }}</p>

            <div class="card">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="value">{{ label_value }}</label>
                        <input type="number" id="value" class="form-input" inputmode="decimal" min="0" step="any" placeholder="{{ ph_value }}" value="{{ ph_value }}">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="from">{{ label_from }}</label>
                        <select id="from" class="form-input">
                            <option value="0">B</option>
                            <option value="1" selected>KB</option>
                            <option value="2">MB</option>
                            <option value="3">GB</option>
                            <option value="4">TB</option>
                            <option value="5">PB</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="to">{{ label_to }}</label>
                        <select id="to" class="form-input">
                            <option value="0">B</option>
                            <option value="1">KB</option>
                            <option value="2" selected>MB</option>
                            <option value="3">GB</option>
                            <option value="4">TB</option>
                            <option value="5">PB</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="system">{{ label_system }}</label>
                        <select id="system" class="form-input">
                            <option value="decimal" selected>{{ opt_decimal }}</option>
                            <option value="binary">{{ opt_binary }}</option>
                        </select>
                    </div>
                </div>
                <div class="button-row" style="margin-top: var(--spacing-md);">
                    <button class="btn btn-primary" type="button" onclick="convert()">{{ btn_convert }}</button>
                    <button class="btn" type="button" onclick="swap()">{{ btn_swap }}</button>
                    <button class="btn" type="button" onclick="resetForm()">{{ btn_reset }}</button>
                </div>
            </div>

            <div id="result" style="display:none;" aria-live="polite">
                <div class="result-card">
                    <div class="label">{{ res_label }}</div>
                    <div class="value" id="resultVal">—</div>
                </div>
                <div class="button-row">
                    <button class="btn" type="button" onclick="shareResult()">{{ btn_share }}</button>
                </div>
            </div>

            <h2>{{ howto_header }}</h2>
            <div class="howto-content">{{ howto_html }}</div>

            <div class="related-tools-section">
                <h3>{{ related_header }}</h3>
                <div class="related-buttons">
                    <a href="/{{ lang_code }}/unit-converter/" class="related-btn">{{ related_unit }}</a><a
                        href="/{{ lang_code }}/base64-converter/" class="related-btn">{{ related_base64 }}</a><a
                        href="/{{ lang_code }}/token-counter/" class="related-btn">{{ related_token }}</a><a
                        href="/{{ lang_code }}/percentage-calculator/" class="related-btn">{{ related_pct }}</a>
                </div>
            </div>
        </div>
    </main>
    <footer class="site-footer"><div class="container"><div class="footer-content"><p>{{ footer }}</p></div></div></footer>
    <script src="/assets/js/common.js"></script>
    <script>
        const LOCALE = document.documentElement.lang || 'en';
        const UNITS_DEC = ['B', 'KB', 'MB', 'GB', 'TB', 'PB'];
        const UNITS_BIN = ['B', 'KiB', 'MiB', 'GiB', 'TiB', 'PiB'];

        function convert() {
            const v = parseFloat(document.getElementById('value').value);
            const from = parseInt(document.getElementById('from').value, 10);
            const to = parseInt(document.getElementById('to').value, 10);
            const sys = document.getElementById('system').value;
            if (!(v >= 0)) { alert('{{ alert_invalid }}'); return; }
            const base = sys === 'binary' ? 1024 : 1000;
            const bytes = v * Math.pow(base, from);
            const result = bytes / Math.pow(base, to);

            // Smart formatting: avoid scientific notation, keep up to 6 sig figs.
            let formatted;
            if (result === 0) formatted = '0';
            else if (result >= 1) formatted = Number(result.toPrecision(6)).toLocaleString(LOCALE, { maximumFractionDigits: 6 });
            else formatted = result.toPrecision(4);

            const units = sys === 'binary' ? UNITS_BIN : UNITS_DEC;
            document.getElementById('resultVal').textContent = formatted + ' ' + units[to];
            document.getElementById('result').style.display = 'block';
        }

        function swap() {
            const f = document.getElementById('from');
            const t = document.getElementById('to');
            const tmp = f.value; f.value = t.value; t.value = tmp;
            convert();
        }

        function resetForm() {
            document.getElementById('value').value = '{{ ph_value }}';
            document.getElementById('from').value = '1';
            document.getElementById('to').value = '2';
            document.getElementById('system').value = 'decimal';
            document.getElementById('result').style.display = 'none';
        }

        async function shareResult() {
            const v = document.getElementById('resultVal').textContent;
            if (v === '—') return;
            const text = '{{ share_text }}'.replace('{value}', v) + ' ' + location.href;
            if (navigator.share) {
                try { await navigator.share({ title: '{{ title }}', text }); return; }
                catch (e) { if (e && e.name === 'AbortError') return; }
            }
            try {
                await navigator.clipboard.writeText(text);
                alert('{{ share_copied }}');
            } catch (e) { /* clipboard blocked */ }
        }
    </script>
</body>

</html>
