<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content"><a href="/zh-cn/" class="site-logo">🛠️ Utilify</a></div>

    </header>
    <main class="main-content">
        <div class="container-narrow">
            <h1>📱 QR 码生成器</h1>
            <div class="security-badge"
                style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                <span title="Processed securely in client-side">🔒 安全 & 客户端处理</span>
                <button id="pwaInstallBtn" class="btn btn-primary"
                    style="display: none; padding: 4px 12px; font-size: 12px;">📲 安装应用</button>
            </div>

            <p>将文本或 URL 转换为 QR 码。</p>
            <div>
                <label class="form-label">文本或 URL</label>
                <input type="text" id="text" class="form-input" placeholder="https://example.com"
                    value="https://utilifyapp.net">
                <div style="margin-top: var(--spacing-md);">
                    <label class="form-label">大小</label>
                    <input type="range" id="size" min="128" max="512" value="256" class="form-input"
                        style="width: 100%;">
                    <span id="sizeValue">256px</span>
                </div>
            </div>
            <div class="qr-container">
                <div id="qrcode"></div>
                <div style="margin-top: var(--spacing-lg);">
                    <button class="btn" id="generateBtn">生成</button>
                    <button class="btn" id="downloadBtn"
                        style="background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color);">下载</button>
                </div>
            </div>

                    <a href="/zh-cn/unit-converter/" class="related-btn">单位转换器</a><a

    <script src="/assets/js/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        const text = document.getElementById('text');
        const size = document.getElementById('size');
        const sizeValue = document.getElementById('sizeValue');
        const qrcodeDiv = document.getElementById('qrcode');
        let qrcode = null;

        size.addEventListener('input', () => {
            sizeValue.textContent = size.value + 'px';
        });

        function generate() {
            if (!text.value) {
                alert('请输入文本。');
                return;
            }
            qrcodeDiv.innerHTML = '';
            qrcode = new QRCode(qrcodeDiv, {
                text: text.value,
                width: parseInt(size.value),
                height: parseInt(size.value),
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        document.getElementById('generateBtn').addEventListener('click', generate);

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const canvas = qrcodeDiv.querySelector('canvas');
            if (!canvas) {
                alert('请先生成 QR 码。');
                return;
            }
            const url = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = url;
            a.download = 'qrcode.png';
            a.click();
        });

        generate();
    </script>
