<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content">

    <main class="main-content">
        <div class="container-narrow">
            <h1>📝 文本工具箱</h1>
            <div class="security-badge"
                style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                <span title="Processed securely in client-side">🔒 安全 & 客户端处理</span>
                <button id="pwaInstallBtn" class="btn btn-primary"
                    style="display: none; padding: 4px 12px; font-size: 12px;">📲 安装应用</button>
            </div>

            <p>统计单词，字符，删除重复项，转换大小写等。</p>

            <div class="card">
                <label class="form-label">输入文本</label>
                <textarea id="textInput" class="form-textarea" style="min-height: 300px;"
                    placeholder="输入文本..."></textarea>
            </div>

            <div class="card">
                <h3>统计</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;">
                    <div class="result-box">
                        <div class="result-value" id="charCount">0</div>
                        <div>字符数</div>
                    </div>
                    <div class="result-box">
                        <div class="result-value" id="wordCount">0</div>
                        <div>单词数</div>
                    </div>
                    <div class="result-box">
                        <div class="result-value" id="lineCount">0</div>
                        <div>行数</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>操作</h3>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="toUpperCase()">大写</button>
                    <button class="btn btn-secondary" onclick="toLowerCase()">小写</button>
                    <button class="btn btn-secondary" onclick="removeDuplicates()">删除重复行</button>
                    <button class="btn btn-secondary" onclick="sortLines()">排序行</button>
                    <button class="btn btn-secondary" onclick="reverseText()">反转文本</button>
                    <button class="btn btn-primary" onclick="copyText()">复制</button>
                    <button class="btn btn-secondary" onclick="clearText()">清除</button>
                </div>
            </div>

            <div class="related-tools-section">
                <h3>相关工具</h3>
                <div class="related-buttons">
                    <a href="/zh-cn/diff-checker/" class="related-btn">文本差异对比</a><a

    <script src="/assets/js/common.js"></script>
    <script>
        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const lineCount = document.getElementById('lineCount');

        function updateStats() {
            const text = textInput.value;
            charCount.textContent = text.length;
            wordCount.textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
            lineCount.textContent = text ? text.split('\n').length : 0;
        }

        function toUpperCase() {
            textInput.value = textInput.value.toUpperCase();
            updateStats();
        }

        function toLowerCase() {
            textInput.value = textInput.value.toLowerCase();
            updateStats();
        }

        function removeDuplicates() {
            const lines = textInput.value.split('\n');
            const unique = [...new Set(lines)];
            textInput.value = unique.join('\n');
            updateStats();
        }

        function sortLines() {
            const lines = textInput.value.split('\n');
            lines.sort();
            textInput.value = lines.join('\n');
            updateStats();
        }

        function reverseText() {
            textInput.value = textInput.value.split('').reverse().join('');
            updateStats();
        }

        function copyText() {
            Utils.copyToClipboard(textInput.value);
        }

        function clearText() {
            textInput.value = '';
            updateStats();
        }

        textInput.addEventListener('input', updateStats);
        updateStats();
    </script>
