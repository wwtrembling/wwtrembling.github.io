    <!-- SQL Formatter Library -->
    <script src="https://cdn.jsdelivr.net/npm/sql-formatter@15.0.2/dist/sql-formatter.min.js"></script>
    <script>
        const inputSQL = document.getElementById('inputSQL');
        const outputSQL = document.getElementById('outputSQL');
        const languageSelect = document.getElementById('languageSelect');
        const formatBtn = document.getElementById('formatBtn');
        const minifyBtn = document.getElementById('minifyBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');

        // Format SQL (Beautify)
        formatBtn.addEventListener('click', () => {
            const sql = inputSQL.value.trim();
            if (!sql) {
                alert('Bitte geben Sie eine SQL-Abfrage ein.');
                return;
            }

            try {
                const formatted = sqlFormatter.format(sql, {
                    language: languageSelect.value,
                    tabWidth: 2,
                    keywordCase: 'upper',
                    linesBetweenQueries: 2
                });
                outputSQL.value = formatted;
            } catch (error) {
                outputSQL.value = 'Error: ' + error.message;
            }
        });

        // Minify SQL
        minifyBtn.addEventListener('click', () => {
            const sql = inputSQL.value.trim();
            if (!sql) {
                alert('Bitte geben Sie eine SQL-Abfrage ein.');
                return;
            }

            try {
                // Remove extra whitespace and newlines
                const minified = sql
                    .replace(/\s+/g, ' ')
                    .replace(/\s*([(),;])\s*/g, '$1')
                    .trim();
                outputSQL.value = minified;
            } catch (error) {
                outputSQL.value = 'Error: ' + error.message;
            }
        });

        // Copy to clipboard
        copyBtn.addEventListener('click', () => {
            if (!outputSQL.value) {
                alert('Kein Inhalt zum Kopieren vorhanden.');
                return;
            }
            Utils.copyToClipboard(outputSQL.value);
        });

        // Clear
        clearBtn.addEventListener('click', () => {
            inputSQL.value = '';
            outputSQL.value = '';
        });

        // Sample SQL
        const sampleSQL = `SELECT u.id, u.name, o.order_id, o.total FROM users u INNER JOIN orders o ON u.id = o.user_id WHERE u.status = 'active' AND o.created_at > '2024-01-01' ORDER BY o.created_at DESC LIMIT 10`;

        inputSQL.value = sampleSQL;
    </script>
