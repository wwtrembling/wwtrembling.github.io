<body>
    <header class="site-header">
        <div class="container">
            <div class="header-content">

        </div>
    </header>

    <main class="main-content">
        <div class="container-narrow">
            <h1>📝 Text-Dienstprogramme</h1>
            <div class="security-badge"
                style="display: flex; align-items: center; justify-content: center; gap: 8px; margin: 10px 0; font-size: 14px; color: var(--text-secondary);">
                <span title="Processed securely in client-side">🔒 Sicher & Clientseitig</span>
                <button id="pwaInstallBtn" class="btn btn-primary"
                    style="display: none; padding: 4px 12px; font-size: 12px;">📲 App installieren</button>
            </div>

            <p>Wörter und Zeichen zählen, Duplikate entfernen, Groß-/Kleinschreibung ändern und mehr.</p>

            <div class="card">
                <label class="form-label">Eingabetext</label>
                <textarea id="textInput" class="form-textarea" style="min-height: 300px;"
                    placeholder="Text eingeben..."></textarea>
            </div>

            <div class="card">
                <h3>Statistik</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;">
                    <div class="result-box">
                        <div class="result-value" id="charCount">0</div>
                        <div>Zeichen</div>
                    </div>
                    <div class="result-box">
                        <div class="result-value" id="wordCount">0</div>
                        <div>Wörter</div>
                    </div>
                    <div class="result-box">
                        <div class="result-value" id="lineCount">0</div>
                        <div>Zeilen</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Aktion</h3>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="toUpperCase()">GROSSBUCHSTABEN</button>
                    <button class="btn btn-secondary" onclick="toLowerCase()">kleinbuchstaben</button>
                    <button class="btn btn-secondary" onclick="removeDuplicates()">Duplikate entfernen</button>
                    <button class="btn btn-secondary" onclick="sortLines()">Sortieren</button>
                    <button class="btn btn-secondary" onclick="reverseText()">Umkehren</button>
                    <button class="btn btn-primary" onclick="copyText()">Kopieren</button>
                    <button class="btn btn-secondary" onclick="clearText()">Löschen</button>
                </div>
            </div>

            <div class="related-tools-section">
                <h3>Ähnliche Tools</h3>
                <div class="related-buttons">
                    <a href="/de/diff-checker/" class="related-btn">Text-Diff-Checker</a><a
                        href="/de/regex-tester/" class="related-btn">Regex-Tester</a><a
                        href="/de/markdown-previewer/" class="related-btn">Markdown-Vorschau</a><a
                        href="/de/lorem-ipsum/" class="related-btn">Lorem Ipsum Generator</a>
                </div>
            </div>

        </div>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <p></p>
            </div>
        </div>
    </footer>

    <script src="/assets/js/common.js"></script>
    <script>
        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const lineCount = document.getElementById('lineCount');

        function updateStats() {
            const text = textInput.value;
            charCount.textContent = text.length;
            wordCount.textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
            lineCount.textContent = text ? text.split('\n').length : 0;
        }

        function toUpperCase() {
            textInput.value = textInput.value.toUpperCase();
            updateStats();
        }

        function toLowerCase() {
            textInput.value = textInput.value.toLowerCase();
            updateStats();
        }

        function removeDuplicates() {
            const lines = textInput.value.split('\n');
            const unique = [...new Set(lines)];
            textInput.value = unique.join('\n');
            updateStats();
        }

        function sortLines() {
            const lines = textInput.value.split('\n');
            lines.sort();
            textInput.value = lines.join('\n');
            updateStats();
        }

        function reverseText() {
            textInput.value = textInput.value.split('').reverse().join('');
            updateStats();
        }

        function copyText() {
            Utils.copyToClipboard(textInput.value);
        }

        function clearText() {
            textInput.value = '';
            updateStats();
        }

        textInput.addEventListener('input', updateStats);
        updateStats();
    </script>
