            color: var(--text-primary);

            gap: var(--spacing-md);

        .option-group {

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary-color);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        .btn-group {
            display: flex;
            gap: var(--spacing-md);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

    <script>
        const inputConfig = document.getElementById('inputConfig');
        const output = document.getElementById('output');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');

        const nestMode = document.getElementById('nestMode');
        const addJsDoc = document.getElementById('addJsDoc');

        function getType(value) {
            if (Array.isArray(value)) return 'array';
            if (value === null) return 'any';
            return typeof value;
        }

        function toPascalCase(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // Interfaces to be printed at the end
        let interfaces = {};

        function generateType(key, value, isRoot = false) {
            const type = getType(value);

            if (type === 'object') {
                const interfaceName = toPascalCase(key);
                parseObject(value, interfaceName); // Recursive call to populate interfaces
                return interfaceName;
            } else if (type === 'array') {
                if (value.length > 0) {
                    const itemType = generateType(key + 'Item', value[0]);
                    return `${itemType}[]`;
                }
                return 'any[]';
            } else {
                return type;
            }
        }

        function getDecorators(key, value, type) {
            const decorators = [];
            decorators.push(`@ApiProperty({ description: '${key} field' })`);

            if (type === 'string') decorators.push('@IsString()');
            if (type === 'number') decorators.push('@IsNumber()');
            if (type === 'boolean') decorators.push('@IsBoolean()');
            if (type === 'array') decorators.push('@IsArray()');
            if (key.toLowerCase().includes('email')) decorators.push('@IsEmail()');
            if (!key.toLowerCase().includes('optional')) decorators.push('@IsNotEmpty()');
            else decorators.push('@IsOptional()');

            return decorators.map(d => '    ' + d).join('\n');
        }

        function parseObject(obj, interfaceName) {
            if (interfaces[interfaceName]) return; // Already processed

            const isNest = nestMode.checked;
            const useJsDoc = addJsDoc.checked;

            let code = '';
            if (isNest) code = `export class ${interfaceName}Dto {\n`;
            else code = `export interface ${interfaceName} {\n`;

            for (const [key, value] of Object.entries(obj)) {
                const tsType = generateType(key, value);

                if (useJsDoc) {
                    code += `    /** ${key} value */\n`;
                }

                if (isNest) {
                    code += getDecorators(key, value, getType(value)) + '\n';
                    code += `    ${key}: ${tsType};\n\n`;
                } else {
                    code += `    ${key}: ${tsType};\n`;
                }
            }
            code += '}\n';
            interfaces[interfaceName] = code;
        }

        convertBtn.addEventListener('click', () => {
            try {
                const json = JSON.parse(inputConfig.value);
                interfaces = {}; // Reset

                // Start parsing from Root
                parseObject(json, 'Root');

                // Combine all generated interfaces
                output.value = Object.values(interfaces).reverse().join('\n');
            } catch (e) {
                console.error(e);
                output.value = "Error parsing JSON: " + e.message;
            }
        });

        clearBtn.addEventListener('click', () => {
            inputConfig.value = '';
            output.value = '';
            inputConfig.focus();
        });

        copyBtn.addEventListener('click', () => {
            if (output.value) Utils.copyToClipboard(output.value);
            else alert('Kopieren할 내용이 없습니다.');
        });

        // Initial run
        convertBtn.click();

    </script>
